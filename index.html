<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic Dash - Menu</title>
    <style>
        /* COMPRESSED CSS AS REQUESTED */
        *,::after,::before{box-sizing:border-box;margin:0;padding:0;user-select:none}html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',Courier,monospace;color:#fff}#app-wrap{position:absolute;top:0;left:0;width:100vw;height:100vh;background:url('img/menu.png') center/cover no-repeat;display:flex;align-items:center;justify-content:center}@media screen and (orientation:portrait){#app-wrap{transform:rotate(90deg);transform-origin:left top;width:100vh;height:100vw;top:100%;left:0}}.glass-panel{background:rgba(255,255,255,.1);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.25);border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,.4);padding:40px;display:flex;flex-direction:column;align-items:center;gap:20px;min-width:320px}h1{font-family:'Impact',sans-serif;font-size:3.5rem;text-transform:uppercase;text-shadow:4px 4px 0 #002D72,0 0 15px #FFD700;color:#FFD700;letter-spacing:3px;margin-bottom:10px;font-style:italic}.btn{background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.4);color:#fff;font-family:'Impact',sans-serif;font-size:1.5rem;text-transform:uppercase;padding:12px 30px;border-radius:12px;cursor:pointer;transition:all .2s ease;text-shadow:1px 1px 0 #000;width:100%;max-width:250px}.btn:hover{background:rgba(255,215,0,.8);color:#000;border-color:#fff;text-shadow:none;transform:scale(1.05);box-shadow:0 0 20px rgba(255,215,0,.5)}.btn:active{transform:scale(.95)}.modal-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;opacity:0;transition:opacity .3s}.modal-overlay.show{display:flex;opacity:1}.modal-content{width:90%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;gap:15px}h2{font-family:'Impact',sans-serif;color:#FFD700;font-size:2.5rem;text-align:center;text-shadow:2px 2px 0 #000;font-style:italic}#level-list{background:rgba(0,0,0,.4);border-radius:12px;padding:10px;overflow-y:auto;flex:1;max-height:40vh;border:1px solid rgba(255,255,255,.2)}.level-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid rgba(255,255,255,.1)}.level-item:last-child{border:none}.level-name{font-size:1.2rem;font-weight:bold;text-shadow:1px 1px 0 #000}.level-play-btn{background:rgba(0,255,0,.3);border:1px solid rgba(255,255,255,.5);color:#fff;padding:5px 15px;border-radius:8px;cursor:pointer;font-weight:bold;font-family:inherit}.level-play-btn:hover{background:rgba(0,255,0,.7);transform:scale(1.05)}.btn-row{display:flex;gap:10px;justify-content:center;margin-top:10px}.btn-row .btn{font-size:1.2rem;padding:10px}
    </style>
</head>
<body>

    <!-- Wraps entire app and forces horizontal via CSS without asking -->
    <div id="app-wrap">
        
        <!-- Apple Arcade x Pixel Vibe Menu Panel -->
        <div class="glass-panel" id="main-menu">
            <h1>Sonic Dash</h1>
            <button class="btn" onclick="navTo('game.html')">Play Game</button>
            <button class="btn" onclick="openLevels()">Levels</button>
            <button class="btn" onclick="navTo('editor.html')">Level Editor</button>
        </div>

        <!-- Levels Popup -->
        <div class="modal-overlay" id="levels-modal">
            <div class="glass-panel modal-content">
                <h2>Custom Zones</h2>
                <div id="level-list">
                    <!-- Populated by JS -->
                </div>
                <div class="btn-row">
                    <label class="btn" style="text-align:center; padding: 10px 20px;">
                        Import JSON
                        <input type="file" accept=".json" style="display:none" onchange="importLevel(event)">
                    </label>
                    <button class="btn" style="background:rgba(255,0,0,0.4);" onclick="closeLevels()">Back</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Audio Setup
        const bgm = new Audio('sound/sonic.mp3');
        bgm.loop = true;
        bgm.volume = 0;
        
        let bgmStarted = false;
        let fadingOut = false;

        // Custom Pixel/Arcade Synth Click
        function playClick() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if(ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }

        // BGM 1s Fade-In
        function initAudio() {
            if(bgmStarted) return;
            bgmStarted = true;
            bgm.play().then(() => {
                let vol = 0;
                let fade = setInterval(() => {
                    if(fadingOut) { clearInterval(fade); return; }
                    vol += 0.05;
                    if(vol >= 0.2) { bgm.volume = 0.2; clearInterval(fade); }
                    else bgm.volume = vol;
                }, 250); // 4 steps over 1 second
            }).catch(e => {
                bgmStarted = false; // Blocked by browser, will try on next interaction
            });
        }

        document.addEventListener('pointerdown', initAudio, { once: true });
        document.addEventListener('click', initAudio, { once: true });

        // BGM 1s Fade-Out & Navigation
        function navTo(url) {
            if(fadingOut) return;
            playClick();
            fadingOut = true;
            
            // Failsafe timer if audio takes too long
            const failSafe = setTimeout(() => { window.location.href = url; }, 1100);

            let vol = bgm.volume || 0.2;
            let fadeOutTimer = setInterval(() => {
                vol -= 0.05;
                if(vol <= 0) {
                    bgm.volume = 0;
                    clearInterval(fadeOutTimer);
                    clearTimeout(failSafe);
                    window.location.href = url;
                } else {
                    bgm.volume = Math.max(0, vol);
                }
            }, 250); // 4 steps over 1 second
        }

        // --- LEVEL MANAGEMENT (Cookie/LocalStorage integration) ---
        function openLevels() {
            playClick();
            document.getElementById('levels-modal').classList.add('show');
            renderLevels();
        }

        function closeLevels() {
            playClick();
            document.getElementById('levels-modal').classList.remove('show');
        }

        function getCustomLevels() {
            try {
                return JSON.parse(localStorage.getItem('sonic_custom_levels')) || [];
            } catch(e) {
                return[];
            }
        }

        function renderLevels() {
            const list = document.getElementById('level-list');
            list.innerHTML = '';
            const levels = getCustomLevels();
            
            if(levels.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#ccc; padding:10px;">No custom zones imported yet.</p>';
                return;
            }

            levels.forEach(lvl => {
                const item = document.createElement('div');
                item.className = 'level-item';
                
                const nameStr = document.createElement('span');
                nameStr.className = 'level-name';
                nameStr.textContent = lvl.name || "Unnamed Zone";

                const playBtn = document.createElement('button');
                playBtn.className = 'level-play-btn';
                playBtn.textContent = 'PLAY';
                playBtn.onclick = () => {
                    playClick();
                    // Will load the specific level via query param when you build game.html
                    navTo(`game.html?level=${encodeURIComponent(lvl.name)}`);
                };

                item.appendChild(nameStr);
                item.appendChild(playBtn);
                list.appendChild(item);
            });
        }

        function importLevel(e) {
            playClick();
            const file = e.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const data = JSON.parse(evt.target.result);
                    if(!data.name || !Array.isArray(data.objects)) throw new Error("Invalid Level JSON");
                    
                    let levels = getCustomLevels();
                    const idx = levels.findIndex(l => l.name === data.name);
                    if(idx > -1) levels[idx] = data; // Overwrite if exists
                    else levels.push(data); // Append new
                    
                    localStorage.setItem('sonic_custom_levels', JSON.stringify(levels));
                    renderLevels();
                    
                    // Reset input so the same file can be selected again if needed
                    e.target.value = '';
                } catch(err) {
                    alert("Invalid JSON format!");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
