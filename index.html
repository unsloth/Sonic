<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sonic Dash JS - High Speed Clone</title>
    <style>
        @font-face {
            font-family: 'PixelEmulator';
            src: url('https://raw.githubusercontent.com/mfm2/PixelEmulator/master/PixelEmulator.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary-blue: #0044CC;
            --sonic-gold: #FFD700;
            --sonic-red: #E3000F;
            --dark-blue: #002D72;
            --white: #FFFFFF;
            --pixel-font: 'PixelEmulator', 'Press Start 2P', cursive;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { 
            background: url('img/menu.png') no-repeat center center fixed; 
            background-size: cover; 
            color: var(--white); 
            font-family: var(--pixel-font); 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh; 
            touch-action: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        /* Force landscape orientation for smaller screens if needed, otherwise rely on viewport-fit=cover */
        @media screen and (max-aspect-ratio: 1/1) { /* If height is greater than width (portrait) */
            body {
                transform: rotate(-90deg);
                transform-origin: bottom left;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100vh;
                height: 100vw;
            }
        }


        #main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(var(--dark-blue-rgb), 0.7); /* Using RGB for transparency */
            border: 4px solid var(--sonic-gold);
            border-radius: 12px;
            padding: 30px 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            animation: fadeIn 1s ease-out;
            min-width: 300px;
        }

        h1 {
            font-size: max(3vw, 2.5rem);
            color: var(--sonic-gold);
            text-shadow: 4px 4px 0px var(--dark-blue);
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1;
        }

        .pixel-btn {
            background: var(--sonic-red);
            border: 2px solid var(--white);
            color: var(--white);
            padding: 15px 30px;
            font-size: max(1.5vw, 1.1rem);
            font-family: var(--pixel-font);
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease-out;
            margin: 10px;
            border-radius: 8px;
            box-shadow: 4px 4px 0px var(--dark-blue);
            position: relative;
            outline: none;
        }

        .pixel-btn::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 2px dashed var(--sonic-gold);
            opacity: 0;
            transition: opacity 0.1s ease-out;
            border-radius: 10px;
        }

        .pixel-btn:hover {
            background: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px var(--dark-blue);
        }
        .pixel-btn:hover::before {
            opacity: 1;
        }

        .pixel-btn:active {
            transform: translateY(2px);
            box-shadow: 2px 2px 0px var(--dark-blue);
            background: var(--sonic-gold);
            color: var(--dark-blue);
        }

        #level-browser-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 45, 114, 0.95);
            border: 3px solid var(--sonic-gold);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            width: 90%;
            max-width: 500px;
            max-height: 90%;
            overflow-y: auto;
            animation: zoomIn 0.3s ease-out;
        }

        #level-browser-popup h2 {
            color: var(--sonic-gold);
            font-size: max(2.5vw, 1.8rem);
            text-shadow: 2px 2px 0px var(--dark-blue);
            margin-bottom: 20px;
        }

        #level-list {
            width: 100%;
            max-height: 60vh;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .level-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 68, 204, 0.2);
            border: 1px solid var(--primary-blue);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            font-size: max(1.2vw, 0.9rem);
        }
        .level-item span { color: var(--white); }
        .level-item button {
            padding: 5px 10px;
            font-size: max(1vw, 0.8rem);
            margin-left: 10px;
            box-shadow: 2px 2px 0px var(--dark-blue);
        }

        .hidden { display: none !important; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes zoomIn {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <audio id="bgm" loop>
        <source src="sound/sonic.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <audio id="sfx-click" src="sound/click.mp3"></audio>

    <div id="main-menu">
        <h1>Sonic Dash JS</h1>
        <button class="pixel-btn" onclick="gameApp.showLevelBrowser()">Play Levels</button>
        <button class="pixel-btn" onclick="gameApp.goToEditor()">Level Editor</button>
    </div>

    <div id="level-browser-popup" class="hidden">
        <h2>Select a Zone</h2>
        <div id="level-list">
            <!-- Level items will be dynamically inserted here -->
        </div>
        <button class="pixel-btn" onclick="gameApp.hideLevelBrowser()">Back to Menu</button>
    </div>

    <script>
        const DEFAULT_LEVEL = {
            name: "Green Hill Dash",
            speed: 1.0,
            objects:[
                {t:'start_flag', x:100, y:-32},
                {t:'coin', x:300, y:-32}, {t:'coin', x:332, y:-32}, {t:'coin', x:364, y:-32},
                {t:'block', x:500, y:-32}, {t:'jump_boost', x:500, y:-64},
                {t:'coin', x:600, y:-128}, {t:'coin', x:632, y:-160}, {t:'coin', x:664, y:-128},
                {t:'ramp', x:800, y:-32},
                {t:'platform', x:1000, y:-96}, {t:'platform', x:1032, y:-96}, {t:'platform', x:1064, y:-96},
                {t:'moto_x', x:1200, y:-96},
                {t:'stop_point', x:1400, y:-32},
                {t:'spike', x:1600, y:-32}, {t:'spike', x:1632, y:-32},
                {t:'end_flag', x:1800, y:-32}
            ]
        };

        const Utils = {
            // Updated to use localStorage for persistence
            saveLocal(key, data) {
                try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) { console.error("localStorage full or blocked:", e); }
            },
            loadLocal(key) {
                try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; }
            },
            getCustomLevels() { return this.loadLocal('sonic_custom_levels') || []; },
            saveCustomLevel(levelObj) {
                const levels = this.getCustomLevels();
                const idx = levels.findIndex(l => l.name === levelObj.name);
                if (idx >= 0) levels[idx] = levelObj;
                else levels.push(levelObj);
                this.saveLocal('sonic_custom_levels', levels);
            }
        };

        const gameApp = {
            bgm: null,
            sfxClick: null,

            init() {
                this.bgm = document.getElementById('bgm');
                this.sfxClick = document.getElementById('sfx-click');
                this.setupAudio();

                // Ensure default level exists on first load
                if (!Utils.loadLocal('sonic_custom_levels') || Utils.getCustomLevels().length === 0) {
                    Utils.saveLocal('sonic_custom_levels', [DEFAULT_LEVEL]);
                }
            },

            setupAudio() {
                this.bgm.volume = 0; // Start muted for fade-in
                this.bgm.play().catch(e => console.warn("BGM playback blocked:", e)); // Autoplay might be blocked

                const fadeIn = () => {
                    let volume = 0;
                    const interval = setInterval(() => {
                        volume += 0.02; // Fade in over 1 second (50 * 0.02 = 1)
                        if (volume >= 0.2) { // Target volume is 0.2
                            this.bgm.volume = 0.2;
                            clearInterval(interval);
                        } else {
                            this.bgm.volume = volume;
                        }
                    }, 20); // 20ms update
                };

                // Try to fade in on first user interaction if autoplay failed
                // Using a 'click' listener on document ensures it works for both touch and mouse
                document.documentElement.addEventListener('click', () => {
                    if (this.bgm.paused && this.bgm.volume === 0) { // Only fade in if not already trying
                        fadeIn();
                    }
                }, { once: true });
                
                // If already playing (e.g., not first visit and browser allowed autoplay), just set volume
                if (this.bgm.readyState >= 3) { // HAVE_FUTURE_DATA or HAVE_ENOUGH_DATA
                    fadeIn();
                }
            },

            playSound(sfx) {
                if (sfx) {
                    sfx.currentTime = 0; // Reset for quick successive plays
                    sfx.volume = 0.5;
                    sfx.play().catch(e => console.warn("SFX playback blocked:", e));
                }
            },

            showLevelBrowser() {
                this.playSound(this.sfxClick);
                document.getElementById('main-menu').classList.add('hidden');
                document.getElementById('level-browser-popup').classList.remove('hidden');
                this.populateLevelBrowser();
            },

            hideLevelBrowser() {
                this.playSound(this.sfxClick);
                document.getElementById('level-browser-popup').classList.add('hidden');
                document.getElementById('main-menu').classList.remove('hidden');
            },

            populateLevelBrowser() {
                const list = document.getElementById('level-list');
                list.innerHTML = '';
                const levels = Utils.getCustomLevels();
                
                if (levels.length === 0) {
                    const noLevels = document.createElement('p');
                    noLevels.textContent = "No custom zones found. Create one in the editor!";
                    noLevels.style.textAlign = 'center';
                    noLevels.style.marginTop = '20px';
                    list.appendChild(noLevels);
                    return;
                }

                levels.forEach((lvl) => {
                    const div = document.createElement('div');
                    div.className = 'level-item';
                    
                    const name = document.createElement('span');
                    name.textContent = lvl.name;
                    div.appendChild(name);

                    const btnGroup = document.createElement('div');
                    
                    const playBtn = document.createElement('button');
                    playBtn.className = 'pixel-btn';
                    playBtn.textContent = 'Play';
                    playBtn.onclick = (e) => {
                        e.stopPropagation(); // Prevent parent click if any
                        this.playSound(this.sfxClick);
                        // Store selected level data in localStorage to pass to game.html
                        localStorage.setItem('selectedLevel', JSON.stringify(lvl));
                        window.location.href = 'game.html'; // Navigate to game.html
                    };
                    btnGroup.appendChild(playBtn);
                    
                    const editBtn = document.createElement('button');
                    editBtn.className = 'pixel-btn';
                    editBtn.textContent = 'Edit';
                    editBtn.style.background = 'var(--primary-blue)';
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        this.playSound(this.sfxClick);
                        localStorage.setItem('selectedLevel', JSON.stringify(lvl));
                        window.location.href = 'editor.html'; // Navigate to editor.html
                    };
                    btnGroup.appendChild(editBtn);

                    div.appendChild(btnGroup);
                    list.appendChild(div);
                });
            },

            goToEditor() {
                this.playSound(this.sfxClick);
                // For new level in editor, pass null/default to editor.html to signify new level creation
                localStorage.removeItem('selectedLevel'); 
                window.location.href = 'editor.html'; // Navigate to editor.html
            }
        };

        // Get RGB values for dynamic transparency calculation in CSS
        const getCssVarRgb = (varName) => {
            const hex = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
            if (hex.startsWith('#')) {
                const r = parseInt(hex.substring(1, 3), 16);
                const g = parseInt(hex.substring(3, 5), 16);
                const b = parseInt(hex.substring(5, 7), 16);
                return `${r}, ${g}, ${b}`;
            }
            return '0, 0, 0'; // Default if not found or invalid
        };
        document.documentElement.style.setProperty('--dark-blue-rgb', getCssVarRgb('--dark-blue'));


        window.onload = () => { gameApp.init(); };
    </script>
</body>
</html>
