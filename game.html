<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sonic Clone - Perfect Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; touch-action: none; }
        
        html, body { 
            width: 100%; height: 100%; overflow: hidden; background: #000; 
            font-family: 'Press Start 2P', monospace; 
        }

        /* Fixed center-aligned wrapper for flawless rotation */
        #game-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            background: #4A90E2;
            overflow: hidden;
            /* Transform is handled precisely by JS */
        }

        #game-container { position: absolute; inset: 0; z-index: 1; }
        #dom-layer { position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
        #touch-layer { position: absolute; inset: 0; z-index: 5; display: flex; }
        .touch-zone { flex: 1; height: 100%; pointer-events: auto; }

        /* UI padding to stay away from edges */
        #ui-layer {
            position: absolute; inset: 0; z-index: 10; pointer-events: none;
            padding: 40px 60px; display: flex; flex-direction: column; justify-content: space-between;
        }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .hud-bottom { display: flex; justify-content: space-between; align-items: flex-end; }

        #score-hud { color: #FFD700; text-shadow: 2px 2px 0 #002D72, -2px -2px 0 #000; font-size: 14px; line-height: 1.5; pointer-events: auto; }

        .pixel-btn {
            background: #002D72; border: 3px solid #fff; color: #fff; font-family: inherit;
            box-shadow: inset -3px -3px 0 rgba(0,0,0,0.4), 4px 4px 0 #000; font-size: 12px; padding: 10px 16px; cursor: pointer;
            text-transform: uppercase; transition: transform 0.1s; outline: none; pointer-events: auto;
        }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: none; background: #FFD700; color: #002D72; }
        .btn-red { background: #E3000F; }

        .action-btn {
            width: 56px; height: 56px; border-radius: 50%; background: rgba(0, 45, 114, 0.85);
            border: 3px solid rgba(255,255,255,0.9); color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 10px; box-shadow: 0 5px 0 rgba(0,0,0,0.5); font-family: inherit; cursor: pointer; pointer-events: auto;
        }
        .action-btn:active { transform: translateY(5px); box-shadow: none; background: rgba(255, 215, 0, 0.9); color: #000; }

        /* Modals */
        .modal-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.88);
            display: none; align-items: center; justify-content: center; z-index: 100; pointer-events: auto;
        }
        .retro-box {
            background: #002D72; border: 4px solid #fff; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.4), 8px 8px 0 #000;
            padding: 30px; display: flex; flex-direction: column; gap: 20px; align-items: center; text-align: center; min-width: 280px;
        }
        .modal-title { color: #FFD700; text-shadow: 3px 3px 0 #000; font-size: 18px; line-height: 1.5; margin-bottom: 10px;}
        .game-gif { position: absolute; top: 0; left: 0; will-change: transform; object-fit: contain; image-rendering: pixelated; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="game-container"></div>
    <div id="dom-layer"></div>

    <div id="touch-layer">
        <div class="touch-zone" id="zone-left"></div>
        <div class="touch-zone" id="zone-right"></div>
    </div>

    <div id="ui-layer">
        <div class="hud-top">
            <div id="score-hud">RINGS: 0<br><span id="speed-hud" style="font-size:10px; color:#FFF;">SPEED: 0</span></div>
            <button class="pixel-btn" id="btn-pause">|| PAUSE</button>
        </div>
        <div class="hud-bottom">
            <button class="action-btn" id="btn-roll-vis">ROLL</button>
            <button class="action-btn" id="btn-jump-vis">JUMP</button>
        </div>
    </div>

    <div id="pause-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title">PAUSED</h2>
            <button class="pixel-btn" id="btn-resume" style="width:100%;">RESUME</button>
            <button class="pixel-btn btn-red" id="btn-quit" style="width:100%;">QUIT</button>
        </div>
    </div>

    <div id="death-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title" style="color:#ff4c4c;">YOU DIED</h2>
            <button class="pixel-btn" id="btn-restart-death" style="width:100%;">TRY AGAIN</button>
            <button class="pixel-btn btn-red" id="btn-quit-death" style="width:100%;">QUIT</button>
        </div>
    </div>

    <div id="win-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title" style="color:#00FF00;">ZONE CLEARED</h2>
            <p id="final-score" style="color:#fff; font-size:12px;">RINGS: 0</p>
            <button class="pixel-btn" id="btn-restart-win" style="width:100%;">PLAY AGAIN</button>
            <button class="pixel-btn btn-red" id="btn-quit-win" style="width:100%;">QUIT</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // JS SCREEN ROTATION ENFORCEMENT (100% FIXED)
    // ==========================================
    function enforceLandscape() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const wrapper = document.getElementById('game-wrapper');

        // Explicitly force the longest edge to be width, shortest to be height. 
        // Eliminates the half-screen canvas glitch completely.
        const gameWidth = Math.max(w, h);
        const gameHeight = Math.min(w, h);

        wrapper.style.width = gameWidth + 'px';
        wrapper.style.height = gameHeight + 'px';

        if (h > w) { 
            // Portrait mode -> visually rotate 90deg
            wrapper.style.transform = 'translate(-50%, -50%) rotate(90deg)';
        } else {
            // Normal landscape
            wrapper.style.transform = 'translate(-50%, -50%) rotate(0deg)';
        }

        if (window.game && window.game.scale) {
            window.game.scale.resize(gameWidth, gameHeight);
        }
    }
    window.addEventListener('resize', enforceLandscape);
    // Initialize setup immediately
    enforceLandscape(); 

    // ==========================================
    // ASSETS & AUDIO
    // ==========================================
    const ASSETS = {
        boost: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/boost.png',
        dirt: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/dirt.png',
        spike: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/spike.png',
        bg: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/images%20(1).png',
        grass: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/grass.png',
        rolling: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/rolling.gif',
        ring: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/ring.gif',
        running: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/running.gif',
        waiting: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/waiting.gif',
        damage: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/damage.png'
    };

    class AudioEngine {
        constructor() {
            try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
            this.bgm = new Audio('https://cdn.jsdelivr.net/gh/unsloth/sonic@main/sound/sonic.mp3');
            this.bgm.loop = true; this.bgm.volume = 0.3;
            this.started = false;
        }
        playBGM() { 
            if(!this.started){ 
                this.bgm.play().catch(e => console.log('BGM Blocked by Browser:', e)); 
                this.started=true; 
            } 
        }
        pauseBGM() { this.bgm.pause(); this.started=false; }
        play(type) {
            if(!this.ctx) return;
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.connect(gain); gain.connect(this.ctx.destination);
            if (type === 'ring') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1200, t); osc.frequency.exponentialRampToValueAtTime(2200, t + 0.1);
                gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.start(t); osc.stop(t + 0.3);
            } else if (type === 'jump') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(300, t + 0.2);
                gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
            } else if (type === 'ring_loss') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.5);
                gain.gain.setValueAtTime(0.4, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                osc.start(t); osc.stop(t + 0.5);
            }
        }
    }
    const sfx = new AudioEngine();

    // Ensure Audio context unlocks on first tap
    document.addEventListener('pointerdown', () => {
        if(sfx.ctx && sfx.ctx.state === 'suspended') sfx.ctx.resume();
    }, {once: true});

    // ==========================================
    // CONSTANTS & HELPERS
    // ==========================================
    const TILE_SIZE = 64;
    const CAT_PLAYER = 0x0001, CAT_GROUND = 0x0002, CAT_RING = 0x0004, CAT_SCATTERED = 0x0008;

    const LEVEL_GRID =[
        { t: 'start_flag', cx: 2, cy: 0 },
        { t: 'ring', cx: 6, cy: 1 }, { t: 'ring', cx: 7, cy: 1 }, { t: 'ring', cx: 8, cy: 1 },
        { t: 'block', cx: 12, cy: 1 }, { t: 'ring', cx: 12, cy: 3 },
        { t: 'spike', cx: 16, cy: 0 },
        { t: 'boost', cx: 20, cy: 0 },
        { t: 'ramp', cx: 24, cy: 0 },
        { t: 'ring', cx: 26, cy: 3 }, { t: 'ring', cx: 27, cy: 4 }, { t: 'ring', cx: 28, cy: 3 },
        { t: 'platform', cx: 33, cy: 2 },
        { t: 'moto_x', cx: 36, cy: 3 },
        { t: 'moto_y', cx: 40, cy: 2 },
        { t: 'spike', cx: 45, cy: 0 }, { t: 'spike', cx: 46, cy: 0 },
        { t: 'boost', cx: 50, cy: 0 },
        { t: 'ramp', cx: 54, cy: 0 },
        { t: 'end_flag', cx: 65, cy: 0 }
    ];

    const domLayer = document.getElementById('dom-layer');
    function createDOMElement(src, w, h) {
        const img = document.createElement('img');
        img.src = src; img.className = 'game-gif';
        img.style.width = w + 'px'; img.style.height = h + 'px';
        img.draggable = false;
        domLayer.appendChild(img);
        return img;
    }

    function generatePixelArt(scene) {
        const g = scene.make.graphics({x:0, y:0, add:false});
        g.clear(); g.fillStyle(0x444444); g.fillRect(14, 0, 4, 128); g.fillStyle(0xAAAAAA); g.fillRect(18, 0, 4, 128);
        g.fillStyle(0x888888); g.fillRect(22, 0, 2, 128);
        for(let y=0; y<4; y++) for(let x=0; x<4; x++) { g.fillStyle((x+y)%2===0 ? 0x00FF00 : 0x006600); g.fillRect(26 + x*9, 8 + y*9, 9, 9); }
        g.generateTexture('tex_start', 64, 128);

        g.clear(); g.fillStyle(0x444444); g.fillRect(14, 0, 4, 128); g.fillStyle(0xAAAAAA); g.fillRect(18, 0, 4, 128);
        for(let y=0; y<4; y++) for(let x=0; x<4; x++) { g.fillStyle((x+y)%2===0 ? 0xFFFFFF : 0x333333); g.fillRect(26 + x*9, 8 + y*9, 9, 9); }
        g.generateTexture('tex_end', 64, 128);

        g.clear(); g.fillStyle(0x5C3317); g.fillRect(0, 0, 128, 16); g.fillStyle(0x8B4513); g.fillRect(1, 1, 126, 14);
        for(let i=0; i<8; i++) { g.fillStyle(0xA0522D); g.fillRect(i*16+2, 2, 13, 6); g.fillStyle(0x8B4513); g.fillRect(i*16+2, 9, 13, 5); g.fillStyle(0x333333); g.fillRect(i*16+6, 4, 3, 3); g.fillRect(i*16+6, 10, 3, 3); }
        g.generateTexture('tex_platform', 128, 16);

        g.clear(); for(let i=0; i<16; i++) { g.fillStyle(i%2===0 ? 0xFFD700 : 0x222222); g.fillRect(i*8, 0, 8, 16); } g.lineStyle(2, 0x000000, 0.5); g.strokeRect(0,0,128,16); g.generateTexture('tex_moto_x', 128, 16);
        g.clear(); for(let i=0; i<16; i++) { g.fillStyle(i%2===0 ? 0xFF4500 : 0x222222); g.fillRect(i*8, 0, 8, 16); } g.lineStyle(2, 0x000000, 0.5); g.strokeRect(0,0,128,16); g.generateTexture('tex_moto_y', 128, 16);

        g.clear(); g.fillStyle(0x5D3A1A); g.beginPath(); g.moveTo(0, 64); g.lineTo(128, 64); g.lineTo(128, 0); g.closePath(); g.fillPath();
        g.fillStyle(0x008800); g.beginPath(); g.moveTo(0, 64); g.lineTo(128, 64); g.lineTo(128, 6); g.closePath(); g.fillPath();
        g.fillStyle(0x00CC00); g.beginPath(); g.moveTo(0, 64); g.lineTo(128, 64); g.lineTo(128, 12); g.closePath(); g.fillPath(); g.generateTexture('tex_ramp', 128, 64);
    }

    // ==========================================
    // SCENES
    // ==========================================
    class BootScene extends Phaser.Scene {
        constructor() { super('BootScene'); }
        preload() {
            this.load.image('bg', ASSETS.bg);
            this.load.image('grass', ASSETS.grass);
            this.load.image('dirt', ASSETS.dirt);
            this.load.image('spike', ASSETS.spike);
            this.load.image('boost', ASSETS.boost);
        }
        create() { generatePixelArt(this); this.scene.start('PlayScene'); }
    }

    class PlayScene extends Phaser.Scene {
        constructor() { super('PlayScene'); }

        init() {
            this.baseSpeed = 10;
            this.rings = 0;
            this.isPaused = false;
            this.playerState = 'waiting';
            this.invulnTimer = 0;
            this.endFlagX = 999999;
            this.rollDown = false;
            this.isGrounded = false;
            this.pOffset = 27.5; 
        }

        create() {
            // Ground Y positioned perfectly 100px from the bottom
            this.groundY = this.scale.height - 100;
            this.levelLength = (Math.max(...LEVEL_GRID.map(o => o.cx || 0)) + 10) * TILE_SIZE;

            this.matter.world.setGravity(0, 2.2);

            this.bg = this.add.tileSprite(this.scale.width/2, this.scale.height/2, this.scale.width, this.scale.height, 'bg').setScrollFactor(0).setDepth(-10).setScale(2);

            const groundWidth = this.levelLength + 2000;
            this.grass = this.add.tileSprite(groundWidth/2, this.groundY + 16, groundWidth, 32, 'grass').setDepth(-4).setScrollFactor(1);
            
            // Fix: Dirt draws all the way to absolute bottom of any screen size
            this.dirt = this.add.tileSprite(groundWidth/2, this.groundY + 1016, groundWidth, 2000, 'dirt').setDepth(-5).setScrollFactor(1);

            this.groundBody = this.matter.add.rectangle(groundWidth/2, this.groundY + 32, groundWidth, 64, {
                isStatic: true, friction: 0.6, restitution: 0, label: 'ground', collisionFilter: { category: CAT_GROUND }
            });

            const startX = TILE_SIZE * 2;
            const startY = this.groundY - 60;
            
            // Physics Fix: Friction near 0 allows proper rolling/sliding interaction with ramps
            this.playerBody = this.matter.add.circle(startX, startY, 22, {
                friction: 0.001, frictionAir: 0.002, restitution: 0, label: 'player', inertia: Infinity,
                collisionFilter: { category: CAT_PLAYER, mask: CAT_GROUND | CAT_RING }
            });

            this.playerDOM = createDOMElement(ASSETS.waiting, 55, 55);

            this.levelObjects =[];
            this.activeRingDoms =[];
            this.ringsToRemove = [];
            this.scatteredRings =[];

            LEVEL_GRID.forEach(obj => {
                const x = obj.cx * TILE_SIZE;
                const y = this.groundY - 32 - (obj.cy * TILE_SIZE);
                let sprite;

                if (obj.t === 'ring') {
                    let rBody = this.matter.add.rectangle(x, y, 28, 28, { isStatic: true, isSensor: true, label: 'ring', collisionFilter: { category: CAT_RING } });
                    let rDom = createDOMElement(ASSETS.ring, 32, 32);
                    this.activeRingDoms.push({ body: rBody, dom: rDom });
                }
                else if (obj.t === 'block') {
                    sprite = this.add.tileSprite(x, y, 64, 64, 'grass').setDepth(-3);
                    this.matter.add.rectangle(x, y, 64, 64, { isStatic: true, label: 'block', collisionFilter: { category: CAT_GROUND } });
                }
                else if (obj.t === 'spike') {
                    sprite = this.matter.add.sprite(x, y + 5, 'spike', null, { isStatic: true, isSensor: true, label: 'spike', collisionFilter: { category: CAT_RING } });
                    sprite.setDisplaySize(64, 54);
                }
                else if (obj.t === 'boost') {
                    sprite = this.matter.add.sprite(x, y + 11, 'boost', null, { isStatic: true, isSensor: true, label: 'boost', collisionFilter: { category: CAT_RING } });
                    sprite.setDisplaySize(64, 41);
                }
                else if (obj.t === 'ramp') {
                    sprite = this.add.image(x, y, 'tex_ramp').setOrigin(0.5).setDepth(-3);
                    // Ramps have slightly low friction to allow physics sliding to launch you up
                    this.matter.add.rectangle(x + 8, y + 8, 140, 18, { isStatic: true, angle: -0.464, friction: 0.05, label: 'ramp', collisionFilter: { category: CAT_GROUND } });
                }
                else if (obj.t === 'platform' || obj.t === 'moto_x' || obj.t === 'moto_y') {
                    sprite = this.matter.add.sprite(x, y, 'tex_' + obj.t, null, { isStatic: true, label: obj.t, collisionFilter: { category: CAT_GROUND } });
                    sprite.setDisplaySize(128, 16); sprite.startX = x; sprite.startY = y;
                }
                else if (obj.t === 'start_flag' || obj.t === 'end_flag') {
                    sprite = this.add.image(x, y - 32, 'tex_' + obj.t.split('_')[0]).setOrigin(0.5).setDepth(-2);
                    this.matter.add.rectangle(x, y - 32, 48, 120, { isStatic: true, isSensor: true, label: obj.t, collisionFilter: { category: CAT_RING } });
                    if(obj.t === 'start_flag') {
                        this.matter.body.setPosition(this.playerBody, { x: x, y: y - 40 });
                        this.matter.body.setVelocity(this.playerBody, { x: 0, y: 0 });
                    }
                    if(obj.t === 'end_flag') this.endFlagX = x;
                }
                if(sprite) { sprite.objType = obj.t; this.levelObjects.push(sprite); }
            });

            this.cameras.main.setBounds(0, -500, this.levelLength + 1000, this.scale.height + 1000);
            this.camTarget = this.add.zone(0, 0, 1, 1);
            
            // Camera Deadzone Tracking
            this.cameras.main.startFollow(this.camTarget, true, 0.08, 0.08, 0, 50);
            this.cameras.main.setDeadzone(150, 100);

            this.setupInputs();
            this.setupCollisions();
            this.updateHUD();
        }

        setPlayerState(state) {
            if(this.playerState === state) return;
            this.playerState = state;
            
            if(state === 'running') {
                this.playerDOM.src = ASSETS.running;
                this.playerDOM.style.width = '48px';
                this.playerDOM.style.height = '48px';
                this.pOffset = 24;
            }
            else if(state === 'rolling') {
                this.playerDOM.src = ASSETS.rolling;
                this.playerDOM.style.width = '48px';
                this.playerDOM.style.height = '48px';
                this.pOffset = 24;
            }
            else if(state === 'waiting') {
                this.playerDOM.src = ASSETS.waiting;
                this.playerDOM.style.width = '55px';
                this.playerDOM.style.height = '55px';
                this.pOffset = 27.5;
            }
            else if(state === 'damage') {
                this.playerDOM.src = ASSETS.damage;
                this.playerDOM.style.width = '55px'; 
                this.playerDOM.style.height = '55px';
                this.pOffset = 27.5;
            }
        }

        startGame() {
            if(this.playerState === 'waiting') {
                sfx.playBGM();
                this.setPlayerState('running');
                // Give initial push
                this.matter.body.setVelocity(this.playerBody, { x: 5, y: 0 });
            }
        }

        setupInputs() {
            this.rollDown = false;
            const bind = (id, downFn, upFn) => {
                const el = document.getElementById(id);
                el.addEventListener('pointerdown', (e) => { e.preventDefault(); this.startGame(); downFn(); });
                if(upFn) {
                    el.addEventListener('pointerup', (e) => { e.preventDefault(); upFn(); });
                    el.addEventListener('pointerleave', (e) => { e.preventDefault(); upFn(); });
                }
            };

            bind('zone-left', () => this.rollDown = true, () => this.rollDown = false);
            bind('btn-roll-vis', () => this.rollDown = true, () => this.rollDown = false);
            bind('zone-right', () => this.triggerJump(), null);
            bind('btn-jump-vis', () => this.triggerJump(), null);

            document.getElementById('btn-pause').addEventListener('click', () => { this.startGame(); this.togglePause(); });
            document.getElementById('btn-resume').addEventListener('click', () => this.togglePause());

            const restart = () => {
                document.querySelectorAll('.modal-overlay').forEach(el => el.style.display = 'none');
                domLayer.innerHTML = '';
                this.scene.restart();
            };
            const quitAction = () => location.reload();

            document.getElementById('btn-quit').addEventListener('click', quitAction);
            document.getElementById('btn-quit-death').addEventListener('click', quitAction);
            document.getElementById('btn-quit-win').addEventListener('click', quitAction);
            document.getElementById('btn-restart-death').addEventListener('click', restart);
            document.getElementById('btn-restart-win').addEventListener('click', restart);
        }

        triggerJump() {
            if(this.isPaused ||['dead','won','damage'].includes(this.playerState)) return;
            this.startGame();
            if(this.isGrounded) {
                this.matter.body.setVelocity(this.playerBody, { x: this.playerBody.velocity.x, y: -15 });
                this.isGrounded = false;
                sfx.play('jump');
            }
        }

        setupCollisions() {
            this.matter.world.on('collisionstart', (event) => {
                event.pairs.forEach(pair => {
                    const { bodyA, bodyB } = pair;
                    const playerBody = bodyA.label === 'player' ? bodyA : (bodyB.label === 'player' ? bodyB : null);
                    const other = playerBody ? (bodyA === playerBody ? bodyB : bodyA) : null;
                    if(!other) return;

                    if(other.label === 'ring') {
                        if(!this.ringsToRemove.includes(other)) {
                            this.ringsToRemove.push(other);
                            this.rings++;
                            this.updateHUD();
                            sfx.play('ring');
                        }
                    } else if(other.label === 'spike') {
                        this.hitSpike();
                    } else if(other.label === 'boost') {
                        // Launch pad shoots him perfectly
                        this.matter.body.setVelocity(this.playerBody, { x: this.playerBody.velocity.x + 8, y: -22 });
                    } else if(other.label === 'end_flag') {
                        this.triggerWin();
                    }
                });
            });
        }

        hitSpike() {
            if(['dead','won','damage'].includes(this.playerState) || this.time.now < this.invulnTimer) return;

            // Authentic Classic Sonic Logic:
            // If Rings > 0 -> Drop ALL rings, survive.
            // If Rings == 0 -> Die.

            if (this.rings > 0) {
                sfx.play('ring_loss');
                this.setPlayerState('damage');
                
                // Cap the visual scattering for performance, but set logic rings to 0
                const scatterVisuals = Math.min(this.rings, 25);
                this.rings = 0; 
                this.updateHUD();

                for(let i=0; i < scatterVisuals; i++) {
                    const angle = Math.PI * 1.1 + (Math.PI * 0.8 * (i / Math.max(1, scatterVisuals - 1))); 
                    const speed = 4 + Math.random() * 6;

                    const rBody = this.matter.add.rectangle(this.playerBody.position.x, this.playerBody.position.y - 10, 16, 16, {
                        restitution: 0.8, friction: 0.005, frictionAir: 0.01, label: 'scattered_ring',
                        collisionFilter: { category: CAT_SCATTERED, mask: CAT_GROUND }
                    });
                    
                    this.matter.body.setVelocity(rBody, { 
                        x: Math.cos(angle) * speed, 
                        y: Math.sin(angle) * speed - 2
                    });

                    const rDom = createDOMElement(ASSETS.ring, 24, 24);
                    this.scatteredRings.push({ body: rBody, dom: rDom, born: this.time.now });

                    this.time.delayedCall(800, () => {
                        if(rBody && rBody.gameObject !== 'recycled') {
                            rBody.collisionFilter.category = CAT_RING;
                            rBody.collisionFilter.mask = CAT_PLAYER | CAT_GROUND;
                            rBody.label = 'ring';
                            rBody.gameObject = rDom;
                        }
                    });
                    this.time.delayedCall(3500, () => { if(rDom) { rDom.style.transition = 'opacity 0.5s'; rDom.style.opacity = '0'; } });
                    this.time.delayedCall(4000, () => {
                        if(rDom) rDom.remove();
                        if(rBody && rBody.gameObject !== 'recycled') {
                            rBody.gameObject = 'recycled';
                            this.matter.world.remove(rBody);
                            this.scatteredRings = this.scatteredRings.filter(r => r.body !== rBody);
                        }
                    });
                }

                // Bounce back gracefully
                this.matter.body.setVelocity(this.playerBody, { x: -6, y: -12 });
                this.invulnTimer = this.time.now + 2000;

                // 2 Seconds of blinking
                let blink = setInterval(() => { 
                    if(this.playerDOM) this.playerDOM.style.opacity = this.playerDOM.style.opacity === '0.3' ? '1' : '0.3'; 
                }, 100);
                this.time.delayedCall(2000, () => { clearInterval(blink); if(this.playerDOM) this.playerDOM.style.opacity = '1'; });

            } else {
                // DIED - Had 0 Rings
                this.setPlayerState('dead');
                sfx.play('ring_loss');
                this.matter.body.setStatic(this.playerBody, true);
                this.cameras.main.shake(300, 0.02);
                
                // Wait 1 second, freeze the game entirely, and show UI
                this.time.delayedCall(1000, () => { 
                    this.scene.pause(); 
                    document.getElementById('death-modal').style.display = 'flex'; 
                });
            }
        }

        triggerWin() {
            if(['dead','won'].includes(this.playerState)) return;
            this.setPlayerState('won');
            this.matter.body.setVelocity(this.playerBody, { x: 2, y: 0 });
            this.time.delayedCall(800, () => {
                document.getElementById('final-score').innerText = `RINGS: ${Math.max(0, this.rings)}`;
                this.scene.pause();
                document.getElementById('win-modal').style.display = 'flex';
            });
        }

        togglePause() {
            if(['dead','won'].includes(this.playerState)) return;
            this.isPaused = !this.isPaused;
            if(this.isPaused) {
                this.scene.pause();
                document.getElementById('pause-modal').style.display = 'flex';
            } else {
                this.scene.resume();
                document.getElementById('pause-modal').style.display = 'none';
            }
        }

        updateHUD() {
            const speed = Math.floor(Math.abs(this.playerBody.velocity.x));
            document.getElementById('score-hud').innerHTML = `RINGS: ${this.rings}<br><span id="speed-hud" style="font-size:10px; color:#FFF;">SPEED: ${speed}</span>`;
        }

        update(time, delta) {
            if(this.isPaused) return;

            const cam = this.cameras.main;

            const px = (this.playerBody.position.x - cam.scrollX) * cam.zoom;
            const py = (this.playerBody.position.y - cam.scrollY) * cam.zoom;
            this.playerDOM.style.transform = `translate(${px - this.pOffset}px, ${py - this.pOffset}px)`;

            this.camTarget.setPosition(this.playerBody.position.x, this.playerBody.position.y);

            this.activeRingDoms.forEach(r => {
                const rx = (r.body.position.x - cam.scrollX) * cam.zoom;
                const ry = (r.body.position.y - cam.scrollY) * cam.zoom;
                r.dom.style.transform = `translate(${rx - 16}px, ${ry - 16}px)`;
            });

            this.scatteredRings.forEach(r => {
                if(r.body && r.dom) {
                    const rx = (r.body.position.x - cam.scrollX) * cam.zoom;
                    const ry = (r.body.position.y - cam.scrollY) * cam.zoom;
                    r.dom.style.transform = `translate(${rx - 12}px, ${ry - 12}px)`;
                }
            });

            if(this.ringsToRemove.length > 0) {
                this.ringsToRemove.forEach(body => {
                    let found = this.activeRingDoms.find(r => r.body === body);
                    if (found) {
                        if(found.dom) found.dom.remove();
                        this.activeRingDoms = this.activeRingDoms.filter(r => r.body !== body);
                    } else {
                        found = this.scatteredRings.find(r => r.body === body);
                        if (found) {
                            if(found.dom) found.dom.remove();
                            this.scatteredRings = this.scatteredRings.filter(r => r.body !== body);
                        }
                    }
                    this.matter.world.remove(body);
                });
                this.ringsToRemove =[];
            }

            if(['dead','won'].includes(this.playerState)) return;

            if(this.playerBody.position.y > this.groundY + 300) {
                if (this.rings > 0) this.rings = 0;
                this.hitSpike();
                return;
            }

            if(this.playerBody.position.x >= this.endFlagX && this.playerState !== 'won') {
                this.triggerWin();
                return;
            }

            this.levelObjects.forEach(obj => {
                if(!obj.body) return;
                if(obj.objType === 'moto_x') {
                    const nx = obj.startX + Math.sin(time * 0.002) * 120;
                    this.matter.body.setPosition(obj.body, { x: nx, y: obj.y });
                    obj.x = nx;
                }
                else if(obj.objType === 'moto_y') {
                    const ny = obj.startY + Math.sin(time * 0.002) * 120;
                    this.matter.body.setPosition(obj.body, { x: obj.x, y: ny });
                    obj.y = ny;
                }
            });

            const bodies = this.matter.world.getAllBodies().filter(b =>
                !b.isSensor && (b.label === 'ground' || b.label === 'block' || b.label === 'ramp' || b.label === 'platform' || b.label === 'moto_x' || b.label === 'moto_y')
            );
            const rayStart = { x: this.playerBody.position.x, y: this.playerBody.position.y + 20 };
            const rayEnd = { x: this.playerBody.position.x, y: this.playerBody.position.y + 40 };
            const collisions = Phaser.Physics.Matter.Matter.Query.ray(bodies, rayStart, rayEnd, 10);
            this.isGrounded = collisions.length > 0;

            if(this.playerState === 'waiting') return;

            if(this.playerState === 'damage') {
                if(this.isGrounded && time > this.invulnTimer - 1500) { 
                    this.setPlayerState('running');
                }
                return;
            }

            // --- REAL PHYSICS-BASED MOVEMENT ---
            
            // Handle Roll Transition & 10% Speed Boost
            if(this.rollDown && this.isGrounded && this.playerState === 'running') {
                this.setPlayerState('rolling');
                // 10% Physics Boost
                this.matter.body.setVelocity(this.playerBody, { 
                    x: this.playerBody.velocity.x * 1.15, 
                    y: this.playerBody.velocity.y 
                });
            } else if(!this.rollDown && this.playerState === 'rolling' && this.isGrounded) {
                this.setPlayerState('running');
            }

            // Using FORCE instead of hardcoded velocity. This perfectly enables slope and ramp physics!
            if(this.playerState === 'running') {
                if (this.playerBody.velocity.x < this.baseSpeed) {
                    this.matter.body.applyForce(this.playerBody, { x: 0.003, y: 0 }); // Drive forward
                }
                if(!this.isGrounded) this.setPlayerState('rolling');
            }
            else if(this.playerState === 'rolling') {
                // While rolling, momentum is preserved. 
                // We barely apply any force, so ramps naturally change your direction!
                if (this.playerBody.velocity.x < this.baseSpeed * 0.6) {
                    this.matter.body.applyForce(this.playerBody, { x: 0.0005, y: 0 }); // Prevents getting completely stuck
                }
            }

            if(this.bg) this.bg.tilePositionX = cam.scrollX * 0.3;
            if(time % 12 === 0) this.updateHUD();
        }
    }

    // ==========================================
    // INIT
    // ==========================================
    window.game = new Phaser.Game({
        type: Phaser.AUTO,
        parent: 'game-container',
        scale: {
            mode: Phaser.Scale.NONE, // Scale is 100% manually driven by our flawless enforceLandscape function
            width: window.innerWidth,
            height: window.innerHeight
        },
        backgroundColor: '#4A90E2',
        physics: {
            default: 'matter',
            matter: {
                gravity: { y: 2.2 },
                runner: { isFixed: false },
                debug: false
            }
        },
        scene:[BootScene, PlayScene],
        pixelArt: true,
        audio: { disableWebAudio: false }
    });
</script>
</body>
</html>
