<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sonic Dash - Game</title>
    <!-- Howler for UI/BGM audio continuity -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <!-- Phaser 3 for Game Engine -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        /* PURE PIXEL RETRO VIBE & STRICT LANDSCAPE LOCK */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        *,::after,::before { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Press Start 2P', 'Courier New', cursive; }
        
        /* Master wrapper that forces landscape dimensions and rotation */
        #app-wrap {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            transform: translate(-50%, -50%);
            overflow: hidden;
        }

        /* If device is portrait, rotate the entire wrapper to force landscape */
        @media screen and (orientation: portrait) { 
            #app-wrap {
                width: 100vh; 
                height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg);
            }
        }

        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* HUD Elements */
        .hud-text { position: absolute; color: #FFD700; text-shadow: 2px 2px 0 #002D72, -1px -1px 0 #fff; font-size: 14px; pointer-events: none; }
        #score-hud { top: 20px; left: 20px; }
        
        /* Pause Button - Exactly 55px right padding constraint, at bottom */
        #pause-ui {
            position: absolute;
            bottom: 30px;
            right: 55px; 
            pointer-events: auto;
        }

        .pixel-btn {
            background: #002D72; border: 3px solid #fff; color: #fff; font-family: 'Press Start 2P', cursive;
            box-shadow: inset -3px -3px 0 rgba(0,0,0,0.4), 4px 4px 0 #000; font-size: 10px; padding: 12px 15px; cursor: pointer;
            text-transform: uppercase; transition: transform 0.1s; outline: none;
        }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: none; background: #FFD700; color: #002D72; }
        .btn-red { background: #E3000F; }

        /* Mobile Controls */
        #mobile-controls { position: absolute; bottom: 30px; left: 20px; display: flex; gap: 20px; pointer-events: auto; }
        .control-btn { 
            width: 70px; height: 70px; border-radius: 50%; background: rgba(0, 45, 114, 0.6); 
            border: 3px solid rgba(255,255,255,0.6); color: rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center; font-size: 10px; 
            box-shadow: 0 5px 0 rgba(0,0,0,0.3); font-family: inherit; cursor: pointer;
        }
        .control-btn:active { transform: translateY(5px); box-shadow: none; background: rgba(255, 215, 0, 0.8); color: #000; }

        /* Pause Menu Modal */
        #pause-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center;
            pointer-events: auto; z-index: 100;
        }
        .retro-box {
            background: #002D72; border: 4px solid #fff; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.4), 8px 8px 0 #000;
            padding: 25px; display: flex; flex-direction: column; gap: 20px; align-items: center; text-align: center;
            min-width: 250px;
        }
    </style>
</head>
<body>

    <div id="app-wrap">
        <div id="game-container"></div>
        
        <div id="ui-layer">
            <div id="score-hud" class="hud-text">RINGS: 0</div>
            
            <div id="pause-ui">
                <button class="pixel-btn" onclick="togglePause()">|| PAUSE</button>
            </div>

            <div id="mobile-controls">
                <button class="control-btn" id="btn-roll">ROLL</button>
                <button class="control-btn" id="btn-jump">JUMP</button>
            </div>

            <div id="pause-menu">
                <div class="retro-box">
                    <h2 style="color:#FFD700; text-shadow:2px 2px 0 #000; font-size:16px; margin-bottom:10px;">PAUSED</h2>
                    <button class="pixel-btn" onclick="togglePause()" style="width:100%;">RESUME</button>
                    <button class="pixel-btn btn-red" onclick="navToMenu()" style="width:100%;">EXIT ZONE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        const bgm = new Audio('sound/sonic.mp3');
        bgm.loop = true;
        bgm.volume = 0.2;
        
        const savedTime = sessionStorage.getItem('sonic_bgm_time');
        if (savedTime) bgm.currentTime = parseFloat(savedTime);
        
        let bgmPlaying = false;
        function playBGM() {
            if(!bgmPlaying) { bgm.play().catch(e=>e); bgmPlaying = true; }
        }
        document.addEventListener('pointerdown', playBGM, { once: true });

        setInterval(() => {
            if (bgmPlaying && !bgm.paused) sessionStorage.setItem('sonic_bgm_time', bgm.currentTime);
        }, 100);

        function playRetroSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if(ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                
                if (type === 'ring') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(2200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'jump') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'boost') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start(); osc.stop(ctx.currentTime + 0.4);
                }
            } catch(e) {}
        }

        function navToMenu() {
            playRetroSound('jump');
            sessionStorage.setItem('sonic_bgm_time', bgm.currentTime);
            setTimeout(() => { window.location.href = 'menu.html'; }, 300);
        }

        // --- GAME DATA ---
        const TRIAL_LEVEL = {
            name: "Mega Trial Zone", speed: 1.0,
            objects:[
                { t: 'start_flag', x: 100, y: -32 },
                { t: 'coin', x: 300, y: -32 }, { t: 'coin', x: 350, y: -32 }, { t: 'coin', x: 400, y: -32 },
                { t: 'spike', x: 600, y: -32 },
                { t: 'jump_boost', x: 800, y: -32 },
                { t: 'coin', x: 800, y: -200 },
                { t: 'ramp', x: 1100, y: -64 },
                { t: 'coin', x: 1200, y: -150 }, { t: 'coin', x: 1300, y: -250 },
                { t: 'platform', x: 1500, y: -100 },
                { t: 'moto_x', x: 1800, y: -100 },
                { t: 'moto_y', x: 2100, y: -100 },
                { t: 'stop_point', x: 2400, y: -32 },
                { t: 'ramp', x: 2700, y: -64 },
                { t: 'end_flag', x: 3200, y: -32 }
            ]
        };

        let gameInstance;
        let isPaused = false;

        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }
            
            preload() {
                // Load user images (Will load 1st frame of gifs automatically in Phaser WebGL)
                this.load.image('bg', 'img/menu2.png');
                this.load.image('grass', 'img/grass.png');
                this.load.image('dirt', 'img/dirt.png');
                this.load.image('spike', 'img/spike.png');
                this.load.image('boost', 'img/boost.png');
                this.load.image('run', 'img/running.gif');
                this.load.image('roll', 'img/rolling.gif');
                this.load.image('ring', 'img/ring.gif');

                // Fallbacks generated instantly
                let g = this.make.graphics({ x:0, y:0, add:false });
                g.fillStyle(0xFFD700); g.fillCircle(16,16,12); g.fillStyle(0x000); g.fillCircle(16,16,8);
                g.generateTexture('fb_ring', 32, 32);
                g.clear(); g.fillStyle(0x8B4513); g.fillRect(0,0,32,32); g.fillStyle(0x228B22); g.fillRect(0,0,32,8);
                g.generateTexture('fb_grass', 32, 32);
                g.clear(); g.fillStyle(0xAAAAAA); g.fillTriangle(16,0, 32,32, 0,32);
                g.generateTexture('fb_spike', 32, 32);
                g.clear(); g.fillStyle(0xE3000F); g.fillRect(0,16,32,16); g.fillStyle(0xFFD700); g.fillRect(4,8,24,8);
                g.generateTexture('fb_boost', 32, 32);
                g.clear(); g.fillStyle(0x0044CC); g.fillCircle(16,16,14); g.fillStyle(0xFFFFFF); g.fillCircle(22,12,4);
                g.generateTexture('fb_run', 32, 32);
                g.clear(); g.fillStyle(0x0044CC); g.fillCircle(16,16,12); g.lineStyle(4, 0x66CCFF); g.strokeCircle(16,16,10);
                g.generateTexture('fb_roll', 32, 32);
                g.clear(); g.fillStyle(0xA0522D); g.fillRect(0,0,64,16);
                g.generateTexture('fb_platform', 64, 16);
                g.clear(); g.fillStyle(0xFF8C00); g.fillRect(0,0,64,16);
                g.generateTexture('fb_moto_x', 64, 16);
                g.clear(); g.fillStyle(0xFF4500); g.fillRect(0,0,64,16);
                g.generateTexture('fb_moto_y', 64, 16);
            }

            create() {
                const urlParams = new URLSearchParams(window.location.search);
                const levelName = urlParams.get('level');
                let levelData = TRIAL_LEVEL;
                if (levelName) {
                    try {
                        const customLevels = JSON.parse(localStorage.getItem('sonic_custom_levels')) ||[];
                        const found = customLevels.find(l => l.name === levelName);
                        if (found) levelData = found;
                    } catch(e) {}
                }
                this.scene.start('PlayScene', { level: levelData });
            }
        }

        class PlayScene extends Phaser.Scene {
            constructor() { super('PlayScene'); }

            init(data) {
                this.levelData = data.level;
                this.groundY = 1000; 
                this.baseSpeed = 10 * (this.levelData.speed || 1);
                this.currentRunSpeed = this.baseSpeed;
                this.rings = 0;
            }

            create() {
                this.matter.world.setGravity(0, 2); 
                
                // Fix Background Scaling completely
                this.bg = this.add.tileSprite(0, 0, 5000, 2000, this.textures.exists('bg') ? 'bg' : 'fb_grass');
                this.bg.setOrigin(0,0).setScrollFactor(0.1).setDepth(-10);
                // Force size display to act like a true backdrop if image is massive
                this.bg.tileScaleX = 0.5; this.bg.tileScaleY = 0.5;

                // Infinite Ground Setup - Properly sized
                this.groundBody = this.matter.add.rectangle(50000, this.groundY + 32, 100000, 64, { isStatic: true, friction: 0.1 });
                this.groundVisual = this.add.tileSprite(0, this.groundY + 16, 100000, 32, this.textures.exists('grass') ? 'grass' : 'fb_grass');
                this.groundVisual.setOrigin(0, 0.5);

                this.levelObjects =[];
                this.ringsToRemove =[];
                
                this.createPlayer();
                this.loadLevelObjects();
                this.setupControls();
                this.setupCollisions();

                // Camera Tracking with natural delay
                this.cameras.main.startFollow(this.player, true, 0.08, 0.08, -this.scale.width / 4, 0);
            }

            createPlayer() {
                this.playerState = 'running';
                this.isTouchingRamp = false;
                this.isGrounded = false;

                // Create physics body 
                this.player = this.matter.add.sprite(100, this.groundY - 60, this.textures.exists('run') ? 'run' : 'fb_run', null, {
                    shape: { type: 'circle', radius: 16 },
                    friction: 0.005, restitution: 0, label: 'player'
                });
                // Fix massive image sizes uploaded by user
                this.player.setDisplaySize(40, 40);
                this.player.setFixedRotation();
            }

            loadLevelObjects() {
                this.levelData.objects.forEach(obj => {
                    const y = this.groundY + obj.y + 16;
                    let tex, sprite;

                    switch(obj.t) {
                        case 'coin':
                            tex = this.textures.exists('ring') ? 'ring' : 'fb_ring';
                            sprite = this.matter.add.sprite(obj.x, y, tex, null, { isStatic: true, isSensor: true, label: 'ring' });
                            sprite.setDisplaySize(24, 24); // Force strict size
                            break;
                        case 'spike':
                            tex = this.textures.exists('spike') ? 'spike' : 'fb_spike';
                            sprite = this.matter.add.sprite(obj.x, y, tex, null, { 
                                shape: { type: 'fromVerts', verts:[{x:16,y:8}, {x:32,y:32}, {x:0,y:32}] }, 
                                isStatic: true, isSensor: true, label: 'spike' 
                            });
                            sprite.setDisplaySize(32, 32);
                            break;
                        case 'jump_boost':
                            tex = this.textures.exists('boost') ? 'boost' : 'fb_boost';
                            sprite = this.matter.add.sprite(obj.x, y, tex, null, { isStatic: true, isSensor: true, label: 'boost' });
                            sprite.setDisplaySize(32, 32);
                            break;
                        case 'ramp':
                            // Polygon representation of curve
                            const rampVerts =[{x:0, y:64}, {x:128, y:64}, {x:128, y:0}];
                            sprite = this.matter.add.sprite(obj.x + 64, y, 'fb_grass', null, { 
                                shape: { type: 'fromVerts', verts: rampVerts }, 
                                isStatic: true, label: 'ramp' 
                            });
                            sprite.setDisplaySize(128, 64);
                            sprite.setTint(0x88FF88); 
                            break;
                        case 'platform':
                            sprite = this.matter.add.sprite(obj.x, y, 'fb_platform', null, { isStatic: true, label: 'platform' });
                            sprite.setDisplaySize(64, 16);
                            break;
                        case 'moto_x':
                        case 'moto_y':
                            sprite = this.matter.add.sprite(obj.x, y, obj.t === 'moto_x' ? 'fb_moto_x' : 'fb_moto_y', null, { isStatic: true, label: obj.t });
                            sprite.setDisplaySize(64, 16);
                            sprite.startX = obj.x; sprite.startY = y;
                            break;
                        case 'stop_point':
                            sprite = this.matter.add.sprite(obj.x, y, 'fb_spike', null, { isStatic: true, isSensor: true, label: 'stop_point' });
                            sprite.setDisplaySize(32, 32);
                            sprite.setTint(0xFF0000);
                            break;
                        case 'start_flag':
                            sprite = this.matter.add.sprite(obj.x, y, 'fb_platform', null, { isStatic: true, isSensor: true });
                            sprite.setDisplaySize(16, 64); // Thin pole
                            sprite.setTint(0x00FF00);
                            this.player.setPosition(obj.x, y - 40); // Move player slightly above
                            break;
                        case 'end_flag':
                            sprite = this.matter.add.sprite(obj.x, y, 'fb_platform', null, { isStatic: true, isSensor: true, label: 'end_flag' });
                            sprite.setDisplaySize(16, 64);
                            sprite.setTint(0xFFFFFF);
                            break;
                    }
                    if(sprite) { sprite.objType = obj.t; this.levelObjects.push(sprite); }
                });
            }

            setupControls() {
                this.input.addPointer(2);
                this.rollBtnDown = false;

                this.cursors = this.input.keyboard.createCursorKeys();
                
                // HTML Buttons events
                const btnRoll = document.getElementById('btn-roll');
                const btnJump = document.getElementById('btn-jump');
                
                btnRoll.addEventListener('pointerdown', () => this.rollBtnDown = true);
                btnRoll.addEventListener('pointerup', () => this.rollBtnDown = false);
                btnRoll.addEventListener('pointerout', () => this.rollBtnDown = false);
                
                btnJump.addEventListener('pointerdown', () => this.triggerJump());
            }

            triggerJump() {
                if (this.playerState === 'stopped') {
                    this.playerState = 'running';
                } else if (this.isGrounded && this.playerState !== 'dead') {
                    this.player.setVelocityY(-14);
                    this.isGrounded = false;
                    playRetroSound('jump');
                    
                    if(this.playerState === 'rolling') {
                        this.playerState = 'running';
                        this.player.setFixedRotation();
                        this.player.rotation = 0;
                        this.player.setTexture(this.textures.exists('run') ? 'run' : 'fb_run');
                        this.player.setDisplaySize(40, 40); // Maintain scale
                    }
                }
            }

            setupCollisions() {
                this.matter.world.on('collisionstart', (event) => {
                    event.pairs.forEach(pair => {
                        const { bodyA, bodyB } = pair;
                        const labels = [bodyA.label, bodyB.label];
                        
                        if (labels.includes('player')) {
                            const other = bodyA.label === 'player' ? bodyB : bodyA;
                            
                            if (other.label === 'ring') {
                                if (!this.ringsToRemove.includes(other.gameObject)) {
                                    this.ringsToRemove.push(other.gameObject);
                                    this.rings++;
                                    document.getElementById('score-hud').innerText = `RINGS: ${this.rings}`;
                                    playRetroSound('ring');
                                }
                            } else if (other.label === 'spike') {
                                this.die();
                            } else if (other.label === 'boost') {
                                this.player.setVelocityY(-20);
                                playRetroSound('boost');
                            } else if (other.label === 'stop_point') {
                                this.playerState = 'stopped';
                                this.player.setVelocity(0, 0);
                            } else if (other.label === 'end_flag') {
                                this.win();
                            }
                        }
                    });
                });

                this.matter.world.on('collisionactive', (event) => {
                    this.isTouchingRamp = false;
                    event.pairs.forEach(pair => {
                        if ((pair.bodyA.label === 'player' && pair.bodyB.label === 'ramp') ||
                            (pair.bodyB.label === 'player' && pair.bodyA.label === 'ramp')) {
                            this.isTouchingRamp = true;
                        }
                    });
                });
            }

            die() {
                if (this.playerState === 'dead') return;
                this.playerState = 'dead';
                playRetroSound('jump'); 
                this.player.setStatic(true);
                this.cameras.main.shake(200, 0.02);
                setTimeout(() => this.scene.restart(), 1000);
            }

            win() {
                if (this.playerState === 'dead' || this.playerState === 'won') return;
                this.playerState = 'won';
                this.player.setVelocity(0,0);
                setTimeout(() => {
                    alert(`ZONE CLEARED!\nRINGS: ${this.rings}`);
                    navToMenu();
                }, 500);
            }

            update(time, delta) {
                if (this.playerState === 'dead' || this.playerState === 'won' || isPaused) return;

                if (this.ringsToRemove.length > 0) {
                    this.ringsToRemove.forEach(r => { if(r && r.active) r.destroy(); });
                    this.ringsToRemove =[];
                }

                this.levelObjects.forEach(obj => {
                    if (obj.objType === 'moto_x' && obj.body) this.matter.body.setPosition(obj.body, { x: obj.startX + Math.sin(time*0.002)*100, y: obj.y });
                    if (obj.objType === 'moto_y' && obj.body) this.matter.body.setPosition(obj.body, { x: obj.x, y: obj.startY + Math.sin(time*0.002)*100 });
                });

                const bodies = this.matter.world.getAllBodies().filter(b => !b.isSensor && b.label !== 'player');
                const raycast = Phaser.Physics.Matter.Matter.Query.ray(bodies, 
                    { x: this.player.x, y: this.player.y }, 
                    { x: this.player.x, y: this.player.y + 20 }
                );
                this.isGrounded = raycast.length > 0;

                const intentRoll = this.rollBtnDown || this.cursors.down.isDown;
                if (this.cursors.space.isDown || this.cursors.up.isDown) this.triggerJump();

                if (this.playerState === 'stopped') {
                    this.player.setTexture(this.textures.exists('run') ? 'run' : 'fb_run');
                    this.player.setDisplaySize(40, 40);
                    return;
                }

                if (intentRoll && this.isGrounded && this.playerState === 'running') {
                    this.playerState = 'rolling';
                    this.player.setTexture(this.textures.exists('roll') ? 'roll' : 'fb_roll');
                    this.player.setDisplaySize(40, 40); // Strict size fix!
                    this.player.setFixedRotation(false); 
                } else if (!intentRoll && this.playerState === 'rolling') {
                    this.playerState = 'running';
                    this.player.setTexture(this.textures.exists('run') ? 'run' : 'fb_run');
                    this.player.setDisplaySize(40, 40);
                    this.player.setFixedRotation();
                    this.player.rotation = 0;
                }

                if (this.playerState === 'running') {
                    if (this.isTouchingRamp) {
                        this.currentRunSpeed = this.baseSpeed * 0.4; // Slow down running on curve
                        this.player.setVelocityX(this.currentRunSpeed);
                    } else {
                        this.currentRunSpeed = Phaser.Math.Linear(this.currentRunSpeed, this.baseSpeed, 0.1);
                        this.player.setVelocityX(this.currentRunSpeed);
                    }
                    
                    if (!this.isGrounded) {
                        this.player.setTexture(this.textures.exists('roll') ? 'roll' : 'fb_roll');
                        this.player.setDisplaySize(40, 40);
                        this.player.rotation += 0.3;
                    } else {
                        this.player.setTexture(this.textures.exists('run') ? 'run' : 'fb_run');
                        this.player.rotation = 0;
                    }
                } 
                else if (this.playerState === 'rolling') {
                    if (!this.isTouchingRamp && this.player.body.velocity.x < this.baseSpeed) {
                        this.player.applyForce({ x: 0.003, y: 0 }); 
                    }
                    if (this.player.body.velocity.x > 1) this.player.rotation += 0.4;
                }

                if(this.bg) {
                    this.bg.tilePositionX = this.cameras.main.scrollX * 0.5;
                }
            }
        }

        // Initialize Phaser strictly filling the CSS-controlled Landscape wrapper
        function initGame() {
            const config = {
                type: Phaser.AUTO,
                parent: 'game-container',
                scale: { 
                    mode: Phaser.Scale.RESIZE,
                    width: '100%',
                    height: '100%'
                },
                backgroundColor: '#4A90E2',
                physics: { default: 'matter', matter: { gravity: { y: 2 }, debug: false } },
                scene:[BootScene, PlayScene],
                pixelArt: true
            };
            gameInstance = new Phaser.Game(config);
        }

        function togglePause() {
            playRetroSound('ring');
            const scene = gameInstance.scene.getScene('PlayScene');
            if(!scene) return;
            
            isPaused = !isPaused;
            if (isPaused) {
                scene.scene.pause();
                document.getElementById('pause-menu').style.display = 'flex';
                bgm.pause();
            } else {
                scene.scene.resume();
                document.getElementById('pause-menu').style.display = 'none';
                if(bgmPlaying) bgm.play().catch(e=>e);
            }
        }

        window.onload = initGame;
    </script>
</body>
</html>
