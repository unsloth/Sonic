<!--
=============================================================================
SUPER HYPER DETAILED PLAN (NERD MODE) - V6 (FIXED LAYOUT, HITBOXES, & GIFS)
=============================================================================
1. TRUE 90° ROTATION (NO AUTO-FULLSCREEN OR PROMPTS):
   - The game is encapsulated in `#wrapper` with `width: 100vh` and `height: 100vw`, rotated 90 degrees using CSS.
   - This explicitly forces a "top-to-bottom" physical screen to display as left-to-right gameplay. 
   - No prompts to rotate, no fullscreen API buttons. It starts instantly.

2. UI PADDING (60px Sides, 20px Top/Bottom):
   - `#ui-layer` uses EXACT padding as requested: `top: 20px; bottom: 20px; left: 60px; right: 60px;`.
   - Placed INSIDE the rotated wrapper so the UI matches the game orientation perfectly.

3. PERFECT NATIVE GIFS & CUSTOM DOM TRACKING:
   - Phaser's built-in DOM elements bug out inside CSS-rotated containers.
   - FIX: I created a custom `#dom-layer` inside the wrapper. During the Phaser `update()` loop, the `<img>` tags (Sonic, Rings) manually calculate their screen coordinates `(worldX - cameraX)` and apply `transform: translate()`.
   - Hitboxes and Visuals are strictly 1:1. Sonic is 48x48. Rings are 32x32. No sinking into the ground. No extra effects applied to GIFs.

4. PROCEDURAL HIGH-QUALITY PIXEL ART:
   - Checkered Flags (Start/End), Wood Platforms, and Motos are generated pixel-by-pixel using `Phaser.Graphics` arrays to mimic true 16-bit retro style instead of flat vector shapes.
   - `grass.png` is reused for the standard block and the curve slope (using a visual mask).

5. WAITING STATE:
   - Sonic uses `waiting.gif` at launch. The game waits until the user touches the screen (jump/roll/move) before starting the physics run.
=============================================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sonic Clone - True 90 Degree Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* RESET & BASE */
        *, ::after, ::before { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }
        html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Press Start 2P', monospace; }

        /* STRICT 90-DEGREE ROTATED WRAPPER */
        #wrapper {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vh;   /* Width becomes the physical height */
            height: 100vw;  /* Height becomes the physical width */
            transform: translate(-50%, -50%) rotate(90deg);
            transform-origin: center center;
            overflow: hidden;
            background: #000;
        }

        /* CANVAS & LAYERS */
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #dom-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* INVISIBLE TOUCH ZONES */
        #touch-zones { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: flex; }
        .touch-half { flex: 1; height: 100%; pointer-events: auto; }

        /* EXACT UI LAYER */
        #ui-layer {
            position: absolute;
            top: 20px; bottom: 20px; left: 60px; right: 60px;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
        .hud-bottom { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none; }

        #score-hud { color: #FFD700; text-shadow: 2px 2px 0 #002D72, -2px -2px 0 #000; font-size: 16px; line-height: 1.5; pointer-events: auto; }

        .pixel-btn {
            background: #002D72; border: 3px solid #fff; color: #fff; font-family: inherit;
            box-shadow: inset -3px -3px 0 rgba(0,0,0,0.4), 4px 4px 0 #000; font-size: 12px; padding: 12px 20px; cursor: pointer;
            text-transform: uppercase; transition: transform 0.1s; outline: none; pointer-events: auto;
        }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: none; background: #FFD700; color: #002D72; }
        .btn-red { background: #E3000F; }

        .action-btn {
            width: 70px; height: 70px; border-radius: 50%; background: rgba(0, 45, 114, 0.8);
            border: 3px solid rgba(255,255,255,0.9); color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 10px; box-shadow: 0 5px 0 rgba(0,0,0,0.5); font-family: inherit; cursor: pointer; pointer-events: auto;
        }
        .action-btn:active { transform: translateY(5px); box-shadow: none; background: rgba(255, 215, 0, 0.9); color: #000; }

        /* MODALS */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center;
            z-index: 100; pointer-events: auto;
        }
        .retro-box {
            background: #002D72; border: 4px solid #fff; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.4), 8px 8px 0 #000;
            padding: 30px; display: flex; flex-direction: column; gap: 20px; align-items: center; text-align: center;
            min-width: 300px; image-rendering: pixelated;
        }
        .modal-title { color: #FFD700; text-shadow: 3px 3px 0 #000; font-size: 20px; line-height: 1.5; margin-bottom: 10px;}

        /* NATIVE GIF CLASSES */
        .game-gif { position: absolute; top: 0; left: 0; will-change: transform; object-fit: contain; }
    </style>
</head>
<body>

<div id="wrapper">
    <!-- Phaser Canvas -->
    <div id="game-container"></div>

    <!-- Custom DOM Layer for Native GIFs -->
    <div id="dom-layer"></div>

    <!-- Input Zones -->
    <div id="touch-zones">
        <div class="touch-half" id="zone-left"></div>
        <div class="touch-half" id="zone-right"></div>
    </div>

    <!-- UI Overlay (60px Sides, 20px Top/Bottom) -->
    <div id="ui-layer">
        <div class="hud-top">
            <div id="score-hud">RINGS: 0<br><span id="speed-hud" style="font-size:10px; color:#FFF;">SPEED: 0</span></div>
            <button class="pixel-btn" id="btn-pause">|| PAUSE</button>
        </div>
        <div class="hud-bottom">
            <button class="action-btn" id="btn-roll-vis">ROLL</button>
            <button class="action-btn" id="btn-jump-vis">JUMP</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="pause-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title">PAUSED</h2>
            <button class="pixel-btn" id="btn-resume" style="width:100%;">RESUME</button>
            <button class="pixel-btn btn-red" id="btn-quit" style="width:100%;">QUIT</button>
        </div>
    </div>

    <div id="death-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title" style="color:#ff4c4c;">YOU DIED</h2>
            <button class="pixel-btn" id="btn-restart-death" style="width:100%;">RETRY</button>
        </div>
    </div>

    <div id="win-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title" style="color:#00FF00;">ZONE CLEARED</h2>
            <p id="final-score" style="color:#fff; font-size:12px;">RINGS: 0</p>
            <button class="pixel-btn" id="btn-restart-win" style="width:100%;">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // EXACT ASSET URLS
    // ==========================================
    const ASSETS = {
        boost: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/boost.png',
        dirt: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/dirt.png',
        spike: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/spike.png',
        bg: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/images%20(1).png',
        grass: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/grass.png',
        rolling: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/rolling.gif',
        ring: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/ring.gif',
        running: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/running.gif',
        waiting: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/waiting.gif'
    };

    // ==========================================
    // AUDIO ENGINE
    // ==========================================
    class AudioEngine {
        constructor() {
            try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
            this.bgm = new Audio('sound/sonic.mp3'); this.bgm.loop = true; this.bgm.volume = 0.3;
            this.started = false;
        }
        playBGM() { if(!this.started){ this.bgm.play().catch(()=>{}); this.started=true; } }
        pauseBGM() { this.bgm.pause(); this.started=false; }
        play(type) {
            if(!this.ctx) return;
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.connect(gain); gain.connect(this.ctx.destination);

            if (type === 'ring') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1200, t); osc.frequency.exponentialRampToValueAtTime(2200, t + 0.1);
                gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.start(t); osc.stop(t + 0.3);
            } else if (type === 'jump') {
                osc.type = 'square'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(300, t + 0.2);
                gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
            } else if (type === 'ring_loss') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.5);
                gain.gain.setValueAtTime(0.4, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                osc.start(t); osc.stop(t + 0.5);
            }
        }
    }
    const sfx = new AudioEngine();

    // ==========================================
    // LEVEL DESIGN (64px Grid)
    // ==========================================
    const TILE_SIZE = 64;
    const LEVEL_GRID =[
        { t: 'start_flag', cx: 2, cy: 1 },
        { t: 'ring', cx: 6, cy: 0 }, { t: 'ring', cx: 7, cy: 0 }, { t: 'ring', cx: 8, cy: 0 },
        { t: 'block', cx: 12, cy: 0 }, { t: 'ring', cx: 12, cy: 2 },
        { t: 'spike', cx: 16, cy: 0 },
        { t: 'boost', cx: 20, cy: 0 },
        { t: 'ramp', cx: 24, cy: 0 },
        { t: 'ring', cx: 26, cy: 3 }, { t: 'ring', cx: 27, cy: 4 }, { t: 'ring', cx: 28, cy: 3 },
        { t: 'platform', cx: 33, cy: 1 },
        { t: 'moto_x', cx: 36, cy: 2 },
        { t: 'moto_y', cx: 40, cy: 1 },
        { t: 'spike', cx: 45, cy: 0 }, { t: 'spike', cx: 46, cy: 0 },
        { t: 'boost', cx: 50, cy: 0 },
        { t: 'ramp', cx: 54, cy: 0 },
        { t: 'end_flag', cx: 65, cy: 1 }
    ];

    const CAT_PLAYER = 0x0001, CAT_GROUND = 0x0002, CAT_RING = 0x0004, CAT_SCATTERED = 0x0008;

    // ==========================================
    // DOM SYNCHRONIZER FOR NATIVE GIFS
    // ==========================================
    const domLayer = document.getElementById('dom-layer');
    function createDOMElement(src, width, height) {
        const img = document.createElement('img');
        img.src = src; img.className = 'game-gif';
        img.style.width = width + 'px'; img.style.height = height + 'px';
        domLayer.appendChild(img);
        return img;
    }

    // ==========================================
    // PIXEL ART GENERATOR
    // ==========================================
    function generatePixelArt(scene) {
        let g = scene.make.graphics({x:0, y:0, add:false});
        
        // Detailed Start Flag (Green/Dark Green Checkered)
        g.clear(); g.fillStyle(0x888888); g.fillRect(12,0,8,128); // Pole
        for(let y=0; y<4; y++) {
            for(let x=0; x<3; x++) {
                g.fillStyle((x+y)%2===0 ? 0x00FF00 : 0x008800);
                g.fillRect(20 + x*12, 10 + y*12, 12, 12);
            }
        }
        g.generateTexture('tex_start', 64, 128);

        // Detailed End Flag (White/Black Checkered)
        g.clear(); g.fillStyle(0x888888); g.fillRect(12,0,8,128);
        for(let y=0; y<4; y++) {
            for(let x=0; x<3; x++) {
                g.fillStyle((x+y)%2===0 ? 0xFFFFFF : 0x000000);
                g.fillRect(20 + x*12, 10 + y*12, 12, 12);
            }
        }
        g.generateTexture('tex_end', 64, 128);

        // Detailed Wood Platform
        g.clear();
        g.fillStyle(0x8B4513); g.fillRect(0,0,128,16); // Base brown
        g.fillStyle(0x654321); // Dark streaks
        for(let i=0; i<8; i++) g.fillRect(i*16 + 4, 2, 8, 4);
        for(let i=0; i<8; i++) g.fillRect(i*16, 10, 10, 4);
        g.generateTexture('tex_platform', 128, 16);

        // Detailed Motos (Hazard stripes)
        g.clear(); g.fillStyle(0x333333); g.fillRect(0,0,128,16);
        for(let i=0; i<8; i++) { g.fillStyle(0xFFD700); g.fillRect(i*16, 0, 8, 16); }
        g.generateTexture('tex_moto_x', 128, 16);
        g.clear(); g.fillStyle(0x333333); g.fillRect(0,0,128,16);
        for(let i=0; i<8; i++) { g.fillStyle(0xFF4500); g.fillRect(i*16, 0, 8, 16); }
        g.generateTexture('tex_moto_y', 128, 16);
    }

    class BootScene extends Phaser.Scene {
        constructor() { super('BootScene'); }
        preload() {
            this.load.image('bg', ASSETS.bg);
            this.load.image('grass', ASSETS.grass);
            this.load.image('dirt', ASSETS.dirt);
            this.load.image('spike', ASSETS.spike);
            this.load.image('boost', ASSETS.boost);
        }
        create() {
            generatePixelArt(this);
            this.scene.start('PlayScene');
        }
    }

    class PlayScene extends Phaser.Scene {
        constructor() { super('PlayScene'); }

        init() {
            this.groundY = 1000;
            this.baseSpeed = 12;
            this.currentRunSpeed = 0; // Starts at 0 until user touches
            this.rings = 0;
            this.isPaused = false;
            this.playerState = 'waiting'; // waiting, running, rolling, dead, won
            this.invulnTimer = 0;
            this.endFlagX = 999999;
            this.levelLength = (Math.max(...LEVEL_GRID.map(o => o.cx || 0)) + 10) * TILE_SIZE; 
        }

        create() {
            this.matter.world.setGravity(0, 2.5);

            // 1. BACKGROUNDS
            this.bg = this.add.tileSprite(0, 0, this.levelLength + 5000, this.scale.height, 'bg');
            this.bg.setOrigin(0,0).setScrollFactor(0.05).setDepth(-10);
            
            // 2. CONTINUOUS GROUND
            this.grass = this.add.tileSprite(0, this.groundY, this.levelLength + 5000, 100, 'grass');
            this.grass.setOrigin(0, 0).setDepth(-4);
            this.dirt = this.add.tileSprite(0, this.groundY + 100, this.levelLength + 5000, 2000, 'dirt');
            this.dirt.setOrigin(0, 0).setDepth(-5);

            this.matter.add.rectangle((this.levelLength + 5000)/2 - 2000, this.groundY + 50, this.levelLength + 9000, 100, { 
                isStatic: true, friction: 0.05, collisionFilter: { category: CAT_GROUND } 
            });

            // 3. PLAYER SETUP
            // Physics Hitbox (Exact 48x48)
            this.playerBody = this.matter.add.rectangle(TILE_SIZE * 2, this.groundY - 100, 48, 48, {
                shape: { type: 'circle', radius: 24 }, friction: 0.001, restitution: 0, label: 'player',
                collisionFilter: { category: CAT_PLAYER, mask: CAT_GROUND | CAT_RING }
            });
            this.matter.body.setInertia(this.playerBody, Infinity);

            // Native DOM GIF
            this.playerDOM = createDOMElement(ASSETS.waiting, 48, 48);

            // 4. LEVEL OBJECTS
            this.levelObjects = [];
            this.activeRingDoms =[];
            this.ringsToRemove = [];
            this.scatteredRings =[];

            LEVEL_GRID.forEach(obj => {
                const x = obj.cx * TILE_SIZE;
                const y = this.groundY - (obj.cy * TILE_SIZE) - (TILE_SIZE/2) + 16; 
                let sprite;

                if (obj.t === 'ring') {
                    let rBody = this.matter.add.rectangle(x, y, 32, 32, { isStatic: true, isSensor: true, label: 'ring', collisionFilter:{category: CAT_RING} });
                    let rDom = createDOMElement(ASSETS.ring, 32, 32);
                    rBody.gameObject = rDom;
                    this.activeRingDoms.push({ body: rBody, dom: rDom });
                } else if (obj.t === 'block') {
                    // Reusing grass texture for blocks
                    sprite = this.add.tileSprite(x, y, 64, 64, 'grass');
                    this.matter.add.rectangle(x, y, 64, 64, { isStatic: true, label: 'block', collisionFilter:{category: CAT_GROUND} });
                } else if (obj.t === 'spike') {
                    sprite = this.matter.add.sprite(x, y + 5, 'spike', null, { 
                        shape: { type: 'fromVerts', verts:[{x:32,y:0}, {x:64,y:54}, {x:0,y:54}] }, 
                        isStatic: true, isSensor: true, label: 'spike', collisionFilter:{category: CAT_RING} 
                    });
                    sprite.setDisplaySize(64, 54);
                } else if (obj.t === 'boost') {
                    sprite = this.matter.add.sprite(x, y + 11, 'boost', null, { 
                        shape: { type: 'rectangle', width: 64, height: 41 },
                        isStatic: true, isSensor: true, label: 'boost', collisionFilter:{category: CAT_RING} 
                    });
                    sprite.setDisplaySize(64, 41);
                } else if (obj.t === 'ramp') {
                    // Curve slope using grass texture
                    let maskShape = this.make.graphics();
                    maskShape.fillStyle(0xffffff);
                    maskShape.beginPath(); maskShape.moveTo(x - 64, y + 32); maskShape.lineTo(x + 64, y + 32); maskShape.lineTo(x + 64, y - 32); maskShape.fillPath();
                    sprite = this.add.tileSprite(x, y, 128, 64, 'grass');
                    sprite.setMask(maskShape.createGeometryMask());
                    
                    this.matter.add.fromVertices(x, y,[{x:0, y:64}, {x:128, y:64}, {x:128, y:0}], { isStatic: true, label: 'ramp', collisionFilter:{category: CAT_GROUND} });
                } else if (obj.t === 'platform' || obj.t === 'moto_x' || obj.t === 'moto_y') {
                    sprite = this.matter.add.sprite(x, y, 'tex_' + obj.t, null, { 
                        shape: { type: 'rectangle', width: 128, height: 16 },
                        isStatic: true, label: obj.t, collisionFilter:{category: CAT_GROUND} 
                    });
                    sprite.startX = x; sprite.startY = y;
                } else if (obj.t === 'start_flag' || obj.t === 'end_flag') {
                    sprite = this.matter.add.sprite(x, y - 32, 'tex_' + obj.t.split('_')[0], null, { 
                        shape: { type: 'rectangle', width: 64, height: 128 },
                        isStatic: true, isSensor: true, label: obj.t, collisionFilter:{category: CAT_RING} 
                    });
                    if(obj.t === 'start_flag') this.matter.body.setPosition(this.playerBody, {x: x, y: y - 24});
                    if(obj.t === 'end_flag') this.endFlagX = x;
                }
                if(sprite) { sprite.objType = obj.t; this.levelObjects.push(sprite); }
            });

            // 5. CAMERA & TRACKING
            this.cameras.main.setBounds(0, -2000, this.levelLength + 2000, 4000);
            this.camTarget = this.add.zone(this.playerBody.position.x, this.playerBody.position.y, 1, 1);
            this.cameras.main.startFollow(this.camTarget, true, 0.1, 0.1, -this.scale.width / 4, 100);

            this.setupInputs();
            this.setupCollisions();
            this.updateHUD();
        }

        setPlayerState(state) {
            if(this.playerState === state) return;
            this.playerState = state;
            if(state === 'running') this.playerDOM.src = ASSETS.running;
            else if(state === 'rolling') this.playerDOM.src = ASSETS.rolling;
            else if(state === 'waiting') this.playerDOM.src = ASSETS.waiting;
        }

        startGame() {
            if(this.playerState === 'waiting') {
                sfx.playBGM();
                this.setPlayerState('running');
                this.currentRunSpeed = this.baseSpeed;
            }
        }

        setupInputs() {
            this.rollDown = false;
            const bind = (id, downFn, upFn) => {
                const el = document.getElementById(id);
                el.onpointerdown = (e) => { this.startGame(); downFn(e); };
                if(upFn) { el.onpointerup = upFn; el.onpointerout = upFn; }
            };

            bind('zone-left', () => this.rollDown = true, () => this.rollDown = false);
            bind('btn-roll-vis', () => this.rollDown = true, () => this.rollDown = false);
            bind('zone-right', () => this.triggerJump());
            bind('btn-jump-vis', () => this.triggerJump());

            document.getElementById('btn-pause').onclick = () => { this.startGame(); this.togglePause(); };
            document.getElementById('btn-resume').onclick = () => this.togglePause();
            
            const restart = () => {
                document.querySelectorAll('.modal-overlay').forEach(el => el.style.display = 'none');
                domLayer.innerHTML = ''; // Clear native GIFs
                this.scene.restart();
            };
            document.getElementById('btn-quit').onclick = () => window.location.reload();
            document.getElementById('btn-restart-death').onclick = restart;
            document.getElementById('btn-restart-win').onclick = restart;
        }

        triggerJump() {
            if(this.isPaused || ['dead','won'].includes(this.playerState)) return;
            if (this.isGrounded) {
                this.matter.body.setVelocity(this.playerBody, {x: this.playerBody.velocity.x, y: -16});
                this.isGrounded = false;
                sfx.play('jump');
                this.setPlayerState('running');
            }
        }

        setupCollisions() {
            this.matter.world.on('collisionstart', (event) => {
                event.pairs.forEach(pair => {
                    const { bodyA, bodyB } = pair;
                    const labels =[bodyA.label, bodyB.label];
                    
                    if (labels.includes('player')) {
                        const other = bodyA.label === 'player' ? bodyB : bodyA;
                        
                        if (other.label === 'ring') {
                            if (!this.ringsToRemove.includes(other)) {
                                this.ringsToRemove.push(other);
                                this.rings++;
                                this.updateHUD();
                                sfx.play('ring');
                            }
                        } else if (other.label === 'spike') {
                            this.hitSpike();
                        } else if (other.label === 'boost') {
                            this.matter.body.setVelocity(this.playerBody, {x: this.playerBody.velocity.x, y: -25});
                        }
                    }
                });
            });

            this.matter.world.on('collisionactive', (event) => {
                this.isTouchingRamp = false;
                event.pairs.forEach(pair => {
                    if ((pair.bodyA.label === 'player' && pair.bodyB.label === 'ramp') ||
                        (pair.bodyB.label === 'player' && pair.bodyA.label === 'ramp')) {
                        this.isTouchingRamp = true;
                    }
                });
            });
        }

        hitSpike() {
            if (['dead','won'].includes(this.playerState) || this.time.now < this.invulnTimer) return;

            if (this.rings > 0) {
                sfx.play('ring_loss');
                const dropCount = Math.min(this.rings, 10);
                this.rings = 0;
                this.updateHUD();
                
                for(let i=0; i<dropCount; i++) {
                    let rBody = this.matter.add.rectangle(this.playerBody.position.x, this.playerBody.position.y, 16, 16, {
                        restitution: 0.8, friction: 0.05, label: 'scattered_ring', collisionFilter: { category: CAT_SCATTERED, mask: CAT_GROUND }
                    });
                    this.matter.body.setVelocity(rBody, {x: Phaser.Math.Between(-8, 8), y: Phaser.Math.Between(-15, -5)});
                    
                    let rDom = createDOMElement(ASSETS.ring, 20, 20);
                    this.scatteredRings.push({ body: rBody, dom: rDom });
                    
                    this.time.delayedCall(1000, () => {
                        if(rBody) { rBody.collisionFilter.category = CAT_RING; rBody.collisionFilter.mask = CAT_PLAYER | CAT_GROUND; rBody.label = 'ring'; rBody.gameObject = rDom; }
                    });
                    this.time.delayedCall(4000, () => {
                        if(rDom) rDom.remove();
                        if(rBody) this.matter.world.remove(rBody);
                    });
                }
                
                this.matter.body.setVelocity(this.playerBody, {x: -6, y: -10});
                this.invulnTimer = this.time.now + 2000;
                
                let blink = setInterval(() => { this.playerDOM.style.opacity = (this.playerDOM.style.opacity == 0) ? 1 : 0; }, 100);
                setTimeout(() => { clearInterval(blink); this.playerDOM.style.opacity = 1; }, 2000);

            } else {
                this.setPlayerState('dead');
                sfx.play('ring_loss'); 
                this.matter.body.setStatic(this.playerBody, true);
                this.cameras.main.shake(300, 0.02);
                setTimeout(() => { document.getElementById('death-modal').style.display = 'flex'; }, 1000);
            }
        }

        triggerWin() {
            if (['dead','won'].includes(this.playerState)) return;
            this.setPlayerState('won');
            this.matter.body.setVelocity(this.playerBody, {x: 0, y: 0});
            setTimeout(() => {
                document.getElementById('final-score').innerText = `RINGS: ${this.rings}`;
                document.getElementById('win-modal').style.display = 'flex';
            }, 500);
        }

        togglePause() {
            if(['dead','won'].includes(this.playerState)) return;
            this.isPaused = !this.isPaused;
            if (this.isPaused) {
                this.scene.pause();
                document.getElementById('pause-modal').style.display = 'flex';
            } else {
                this.scene.resume();
                document.getElementById('pause-modal').style.display = 'none';
            }
        }

        updateHUD() {
            document.getElementById('score-hud').innerHTML = `RINGS: ${this.rings}<br><span id="speed-hud" style="font-size:10px; color:#FFF;">SPEED: ${Math.floor(this.currentRunSpeed)}</span>`;
        }

        // ==========================================
        // UPDATE LOOP (DOM SYNCING)
        // ==========================================
        update(time, delta) {
            if (this.isPaused) return;

            // DOM SYNC: Map World coordinates to Screen coordinates
            const cam = this.cameras.main;
            
            // Sync Player
            const px = (this.playerBody.position.x - cam.scrollX) * cam.zoom;
            const py = (this.playerBody.position.y - cam.scrollY) * cam.zoom;
            this.playerDOM.style.transform = `translate(${px - 24}px, ${py - 24}px)`; // -24 to center the 48x48 image
            
            this.camTarget.setPosition(this.playerBody.position.x, this.playerBody.position.y);

            // Sync Static Rings
            this.activeRingDoms.forEach(r => {
                const rx = (r.body.position.x - cam.scrollX) * cam.zoom;
                const ry = (r.body.position.y - cam.scrollY) * cam.zoom;
                r.dom.style.transform = `translate(${rx - 16}px, ${ry - 16}px)`;
            });

            // Sync Scattered Rings
            this.scatteredRings.forEach(r => {
                if(r.body) {
                    const rx = (r.body.position.x - cam.scrollX) * cam.zoom;
                    const ry = (r.body.position.y - cam.scrollY) * cam.zoom;
                    r.dom.style.transform = `translate(${rx - 10}px, ${ry - 10}px)`;
                }
            });

            if (this.playerState === 'waiting' ||['dead','won'].includes(this.playerState)) return;

            // Win Check
            if (this.playerBody.position.x >= this.endFlagX) {
                this.triggerWin();
                return;
            }

            // Clean up collected rings
            if (this.ringsToRemove.length > 0) {
                this.ringsToRemove.forEach(body => { 
                    if(body.gameObject) body.gameObject.remove(); 
                    this.matter.world.remove(body); 
                    this.activeRingDoms = this.activeRingDoms.filter(r => r.body !== body);
                });
                this.ringsToRemove =[];
            }

            // Moving Platforms
            this.levelObjects.forEach(obj => {
                if (obj.objType === 'moto_x' && obj.body) this.matter.body.setPosition(obj.body, { x: obj.startX + Math.sin(time*0.002)*150, y: obj.y });
                if (obj.objType === 'moto_y' && obj.body) this.matter.body.setPosition(obj.body, { x: obj.x, y: obj.startY + Math.sin(time*0.002)*150 });
            });

            // Ground Check
            const bodies = this.matter.world.getAllBodies().filter(b => !b.isSensor && b.label !== 'player' && b.collisionFilter.category === CAT_GROUND);
            const raycast = Phaser.Physics.Matter.Matter.Query.ray(bodies, { x: this.playerBody.position.x, y: this.playerBody.position.y }, { x: this.playerBody.position.x, y: this.playerBody.position.y + 30 });
            this.isGrounded = raycast.length > 0;

            // Input States
            if (this.rollDown && this.isGrounded && this.playerState === 'running') {
                this.setPlayerState('rolling');
            } else if (!this.rollDown && this.playerState === 'rolling') {
                this.setPlayerState('running');
            }

            // Physics application
            if (this.playerState === 'running') {
                if (this.isTouchingRamp) this.currentRunSpeed = this.baseSpeed * 0.4;
                else this.currentRunSpeed = Phaser.Math.Linear(this.currentRunSpeed, this.baseSpeed, 0.1);
                
                if(this.time.now > this.invulnTimer - 1500) this.matter.body.setVelocity(this.playerBody, {x: this.currentRunSpeed, y: this.playerBody.velocity.y});
                if (!this.isGrounded) this.setPlayerState('rolling');
            } 
            else if (this.playerState === 'rolling') {
                if (!this.isTouchingRamp && this.playerBody.velocity.x < this.baseSpeed) {
                    this.matter.body.applyForce(this.playerBody, {x: 0.003, y: 0});
                }
            }

            // Background Parallax
            if(this.bg) this.bg.tilePositionX = this.cameras.main.scrollX * 0.5;
            if(time % 10 < 1) this.updateHUD();
        }
    }

    // INIT PHASER
    window.onload = () => {
        new Phaser.Game({
            type: Phaser.AUTO,
            parent: 'game-container',
            scale: { mode: Phaser.Scale.RESIZE, width: '100%', height: '100%' },
            backgroundColor: '#4A90E2',
            physics: { default: 'matter', matter: { gravity: { y: 2.5 }, debug: false } },
            scene: [BootScene, PlayScene],
            pixelArt: true
        });
    };
</script>
</body>
</html>
