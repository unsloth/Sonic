<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sonic Dash - Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
        }
        
        html, body { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Press Start 2P', monospace; 
            position: fixed; 
        }

        #game-wrapper {
            position: fixed; 
            top: 50%; 
            left: 50%; 
            width: 100vh; 
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
            transform-origin: center center; 
            overflow: hidden; 
            background: #4A90E2;
        }

        #game-container { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }

        #dom-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 2; 
            pointer-events: none; 
            overflow: hidden; 
        }

        #touch-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 5; 
            display: flex; 
        }
        
        .touch-zone { 
            flex: 1; 
            height: 100%; 
            pointer-events: auto; 
        }

        #ui-layer {
            position: absolute; 
            top: 65px; 
            bottom: 65px; 
            left: 115px; 
            right: 115px;
            z-index: 10; 
            pointer-events: none; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }

        .hud-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
        }

        .hud-bottom { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
        }

        #score-hud { 
            color: #FFD700; 
            text-shadow: 2px 2px 0 #002D72, -2px -2px 0 #000; 
            font-size: 14px; 
            line-height: 1.5; 
            pointer-events: auto; 
        }

        .pixel-btn {
            background: #002D72; 
            border: 3px solid #fff; 
            color: #fff; 
            font-family: inherit; 
            font-size: 12px; 
            padding: 10px 16px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: transform 0.1s; 
            outline: none; 
            pointer-events: auto;
            box-shadow: inset -3px -3px 0 rgba(0,0,0,0.4), 4px 4px 0 #000;
        }

        .pixel-btn:active { 
            transform: translate(4px, 4px); 
            box-shadow: none; 
            background: #FFD700; 
            color: #002D72; 
        }

        .btn-red { 
            background: #E3000F; 
        }

        .action-btn {
            width: 64px; 
            height: 64px; 
            border-radius: 50%; 
            background: rgba(0, 45, 114, 0.85);
            border: 3px solid rgba(255,255,255,0.9); 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 10px; 
            box-shadow: 0 5px 0 rgba(0,0,0,0.5); 
            font-family: inherit; 
            cursor: pointer; 
            pointer-events: auto;
        }

        .action-btn:active { 
            transform: translateY(5px); 
            box-shadow: none; 
            background: rgba(255, 215, 0, 0.9); 
            color: #000; 
        }

        .modal-overlay {
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.92); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            pointer-events: auto; 
            flex-direction: column;
        }

        .retro-box {
            background: #002D72; 
            border: 4px solid #fff; 
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.4), 8px 8px 0 #000;
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            align-items: center; 
            text-align: center; 
            min-width: 280px; 
            max-width: 80%;
        }

        .modal-title { 
            color: #FFD700; 
            text-shadow: 3px 3px 0 #000; 
            font-size: 18px; 
            line-height: 1.5; 
            margin-bottom: 10px; 
        }

        .game-gif { 
            position: absolute; 
            top: 0; 
            left: 0; 
            will-change: transform; 
            object-fit: contain; 
            image-rendering: pixelated; 
            pointer-events: none; 
        }

        .damage-flash { 
            position: absolute; 
            inset: 0; 
            background: rgba(255, 0, 0, 0.3); 
            display: none; 
            z-index: 50; 
            pointer-events: none; 
        }
    </style>
<base target="_blank">
</head>
<body>

<div id="game-wrapper">
    <div id="game-container"></div>
    <div id="dom-layer"></div>
    <div id="damage-flash" class="damage-flash"></div>

    <div id="touch-layer">
        <div class="touch-zone" id="zone-left"></div>
        <div class="touch-zone" id="zone-right"></div>
    </div>

    <div id="ui-layer">
        <div class="hud-top">
            <div id="score-hud">RINGS: 0</div>
            <button class="pixel-btn" id="btn-pause">|| PAUSE</button>
        </div>
        <div class="hud-bottom">
            <button class="action-btn" id="btn-roll-vis">ROLL</button>
            <button class="action-btn" id="btn-jump-vis">JUMP</button>
        </div>
    </div>

    <div id="pause-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title">PAUSED</h2>
            <button class="pixel-btn" id="btn-resume" style="width:100%;">RESUME</button>
            <button class="pixel-btn btn-red" id="btn-quit" style="width:100%;">EXIT ZONE</button>
        </div>
    </div>

    <div id="death-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title" style="color:#ff4c4c;">YOU DIED</h2>
            <button class="pixel-btn" id="btn-retry" style="width:100%;">TRY AGAIN</button>
            <button class="pixel-btn btn-red" id="btn-quit-death" style="width:100%;">EXIT ZONE</button>
        </div>
    </div>

    <div id="win-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title" style="color:#00FF00;">ZONE CLEARED!</h2>
            <p id="final-score" style="color:#fff; font-size:12px;">RINGS: 0</p>
            <button class="pixel-btn" id="btn-play-again" style="width:100%;">PLAY AGAIN</button>
            <button class="pixel-btn btn-red" id="btn-quit-win" style="width:100%;">EXIT ZONE</button>
        </div>
    </div>
</div>

<script>
// ==========================================
// ASSETS & CONFIGURATIONS
// ==========================================
const ASSETS = {
    boost: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/boost.png',
    dirt: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/dirt.png',
    spike: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/spike.png',
    bg: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/images%20(1).png',
    grass: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/grass.png',
    rolling: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/rolling.gif',
    rolling2: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/rolling-2.gif',
    ring: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/ring.gif',
    running: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/running.gif',
    waiting: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/waiting.gif',
    damage: 'https://raw.githubusercontent.com/unsloth/sonic/refs/heads/main/img/damage.png'
};

const preloadDOMImages = () => { 
    Object.values(ASSETS).forEach(src => { 
        const img = new Image(); 
        img.src = src; 
    }); 
};
preloadDOMImages();

// ==========================================
// AUDIO ENGINE
// ==========================================
class AudioEngine {
    constructor() {
        try { 
            this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
        } catch(e) {}
        
        this.bgm = new Audio('https://cdn.jsdelivr.net/gh/unsloth/sonic@main/music/sonic.mp3');
        this.bgm.loop = true; 
        this.bgm.volume = 0.33; 
        this.started = false;
    }

    async playBGM() { 
        if(!this.started) { 
            try { 
                await this.bgm.play(); 
                this.started = true; 
            } catch(e) {} 
        } 
    }

    pauseBGM() { 
        this.bgm.pause(); 
        this.started = false; 
    }

    play(type) {
        if(!this.ctx) return;
        if(this.ctx.state === 'suspended') this.ctx.resume();
        
        const t = this.ctx.currentTime; 
        const osc = this.ctx.createOscillator(); 
        const gain = this.ctx.createGain();
        
        osc.connect(gain); 
        gain.connect(this.ctx.destination);
        
        if(type === 'ring') { 
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(1200, t); 
            osc.frequency.exponentialRampToValueAtTime(2200, t + 0.1); 
            gain.gain.setValueAtTime(0.3, t); 
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3); 
            osc.start(t); 
            osc.stop(t + 0.3); 
        } else if(type === 'jump') { 
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(150, t); 
            osc.frequency.exponentialRampToValueAtTime(300, t + 0.2); 
            gain.gain.setValueAtTime(0.1, t); 
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2); 
            osc.start(t); 
            osc.stop(t + 0.2); 
        } else if(type === 'ring_loss') { 
            osc.type = 'sawtooth'; 
            osc.frequency.setValueAtTime(400, t); 
            osc.frequency.exponentialRampToValueAtTime(50, t + 0.5); 
            gain.gain.setValueAtTime(0.4, t); 
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5); 
            osc.start(t); 
            osc.stop(t + 0.5); 
        } else if(type === 'damage') { 
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(80, t); 
            osc.frequency.exponentialRampToValueAtTime(40, t + 0.2); 
            gain.gain.setValueAtTime(0.3, t); 
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2); 
            osc.start(t); 
            osc.stop(t + 0.2); 
        }
    }
}

const sfx = new AudioEngine();

// ==========================================
// CONSTANTS & HELPERS
// ==========================================
const TILE_SIZE = 64;
const CAT_PLAYER = 0x0001;
const CAT_GROUND = 0x0002;
const CAT_RING = 0x0004;
const CAT_SCATTERED = 0x0008;

const domLayer = document.getElementById('dom-layer');

function createDOMElement(src, w, h) {
    const img = document.createElement('img');
    img.src = src; 
    img.className = 'game-gif'; 
    img.style.width = w + 'px'; 
    img.style.height = h + 'px';
    img.draggable = false; 
    domLayer.appendChild(img); 
    return img;
}

function generatePixelArt(scene) {
    const g = scene.make.graphics({x:0, y:0, add:false});
    
    // Start Flag
    g.clear(); 
    g.fillStyle(0x666666); g.fillRect(14, 0, 4, 128); 
    g.fillStyle(0xAAAAAA); g.fillRect(18, 0, 4, 128);
    for(let y=0; y<4; y++) {
        for(let x=0; x<4; x++) { 
            g.fillStyle((x+y)%2===0 ? 0x00FF00 : 0x006600); 
            g.fillRect(26 + x*9, 8 + y*9, 9, 9); 
        }
    }
    g.generateTexture('tex_start', 64, 128);
    
    // End Flag
    g.clear(); 
    g.fillStyle(0x666666); g.fillRect(14, 0, 4, 128); 
    g.fillStyle(0xAAAAAA); g.fillRect(18, 0, 4, 128);
    for(let y=0; y<4; y++) {
        for(let x=0; x<4; x++) { 
            g.fillStyle((x+y)%2===0 ? 0xFFFFFF : 0x333333); 
            g.fillRect(26 + x*9, 8 + y*9, 9, 9); 
        }
    }
    g.generateTexture('tex_end', 64, 128);
    
    // Platform
    g.clear(); 
    g.fillStyle(0x5C3317); g.fillRect(0, 0, 128, 16); 
    g.fillStyle(0x8B4513); g.fillRect(1, 1, 126, 14);
    for(let i=0; i<8; i++) { 
        g.fillStyle(0xA0522D); g.fillRect(i*16+2, 2, 13, 6); 
        g.fillStyle(0x8B4513); g.fillRect(i*16+2, 9, 13, 5); 
        g.fillStyle(0x333333); g.fillRect(i*16+6, 4, 3, 3); 
        g.fillStyle(0x333333); g.fillRect(i*16+6, 10, 3, 3); 
    } 
    g.generateTexture('tex_platform', 128, 16);
    
    // Moto X
    g.clear(); 
    for(let i=0; i<16; i++) { 
        g.fillStyle(i%2===0 ? 0xFFD700 : 0x222222); 
        g.fillRect(i*8, 0, 8, 16); 
    } 
    g.generateTexture('tex_moto_x', 128, 16);
    
    // Moto Y
    g.clear(); 
    for(let i=0; i<16; i++) { 
        g.fillStyle(i%2===0 ? 0xFF4500 : 0x222222); 
        g.fillRect(i*8, 0, 8, 16); 
    } 
    g.generateTexture('tex_moto_y', 128, 16);
    
    // Ramp
    g.clear(); 
    g.fillStyle(0x5D3A1A); 
    g.beginPath(); 
    g.moveTo(0, 64); g.lineTo(128, 64); g.lineTo(128, 0); 
    g.closePath(); g.fillPath(); 
    g.fillStyle(0x00AA00); 
    g.beginPath(); 
    g.moveTo(0, 64); g.lineTo(128, 64); g.lineTo(128, 4); 
    g.closePath(); g.fillPath(); 
    g.fillStyle(0x00CC00); 
    g.beginPath(); 
    g.moveTo(0, 64); g.lineTo(128, 64); g.lineTo(128, 10); 
    g.closePath(); g.fillPath(); 
    g.generateTexture('tex_ramp', 128, 64);
}

// ==========================================
// SCENES
// ==========================================
class BootScene extends Phaser.Scene {
    constructor() { 
        super('BootScene'); 
    }

    preload() { 
        this.load.image('bg', ASSETS.bg); 
        this.load.image('grass', ASSETS.grass); 
        this.load.image('dirt', ASSETS.dirt); 
        this.load.image('spike', ASSETS.spike); 
        this.load.image('boost', ASSETS.boost); 
        this.load.image('damage', ASSETS.damage); 
    }

    create() { 
        generatePixelArt(this); 
        this.scene.start('PlayScene'); 
    }
}

class PlayScene extends Phaser.Scene {
    constructor() { 
        super('PlayScene'); 
    }

    init() {
        const wrapper = document.getElementById('game-wrapper');
        this.gameWidth = wrapper.offsetWidth; 
        this.gameHeight = wrapper.offsetHeight;
        this.baseSpeed = 7; 
        this.currentSpeed = 0; 
        this.rings = 0;
        this.isPaused = false; 
        this.isGameOver = false; 
        this.playerState = 'waiting';
        this.invulnTimer = 0; 
        this.rollDown = false; 
        this.isGrounded = false; 
        this.onRamp = false; 
        this.endFlagX = 999999;
    }

    create() {
        this.groundY = this.gameHeight - 80;
        
        // Calculate dynamic level length based on loaded JSON data
        let maxCx = Math.max(...window.sonicLevelData.map(o => o.cx || 0), 20);
        this.levelLength = (maxCx + 15) * TILE_SIZE;

        this.matter.world.setGravity(0, 2.0);
        
        this.bg = this.add.tileSprite(
            this.gameWidth/2, this.gameHeight/2, 
            this.gameWidth, this.gameHeight, 'bg'
        ).setScrollFactor(0).setDepth(-10).setScale(2);
        
        const groundWidth = this.levelLength + 2000;
        
        this.grass = this.add.tileSprite(
            groundWidth/2, this.groundY + 16, 
            groundWidth, 32, 'grass'
        ).setDepth(-4);
        
        this.dirt = this.add.tileSprite(
            groundWidth/2, this.groundY + 232, 
            groundWidth, 400, 'dirt'
        ).setDepth(-5);
        
        this.groundBody = this.matter.add.rectangle(
            groundWidth/2, this.groundY + 50, 
            groundWidth, 100, 
            { 
                isStatic: true, 
                friction: 0.8, 
                restitution: 0, 
                label: 'ground', 
                collisionFilter: { category: CAT_GROUND } 
            }
        );

        // Identify starting point
        let startFlag = window.sonicLevelData.find(o => o.t === 'start_flag');
        const startX = startFlag ? startFlag.cx * TILE_SIZE : TILE_SIZE * 2;
        const startY = startFlag ? this.groundY - 32 - (startFlag.cy * TILE_SIZE) - 40 : this.groundY - 50;

        this.playerBody = this.matter.add.circle(startX, startY, 24, { 
            friction: 0.005, 
            frictionAir: 0.01, 
            restitution: 0.1, 
            label: 'player', 
            collisionFilter: { category: CAT_PLAYER, mask: CAT_GROUND | CAT_RING } 
        });
        
        this.matter.body.setInertia(this.playerBody, Infinity);

        this.playerDOM = createDOMElement(ASSETS.waiting, 69, 69);
        this.damageFlash = document.getElementById('damage-flash');
        
        this.levelObjects =[]; 
        this.activeRingDoms = []; 
        this.ringsToRemove =[]; 
        this.scatteredRings =[];

        // Build Level dynamically
        window.sonicLevelData.forEach(obj => {
            const x = obj.cx * TILE_SIZE; 
            const y = this.groundY - 32 - (obj.cy * TILE_SIZE); 
            let sprite;
            
            switch(obj.t) {
                case 'ring': 
                    const rBody = this.matter.add.rectangle(x, y, 24, 24, { 
                        isStatic: true, 
                        isSensor: true, 
                        label: 'ring', 
                        collisionFilter: { category: CAT_RING } 
                    }); 
                    const rDom = createDOMElement(ASSETS.ring, 28, 28); 
                    this.activeRingDoms.push({ body: rBody, dom: rDom }); 
                    break;
                    
                case 'block': 
                    sprite = this.add.tileSprite(x, y, 64, 64, 'grass').setDepth(-3); 
                    this.matter.add.rectangle(x, y, 64, 64, { 
                        isStatic: true, 
                        label: 'block', 
                        collisionFilter: { category: CAT_GROUND } 
                    }); 
                    break;
                    
                case 'spike': 
                    sprite = this.matter.add.sprite(x, y + 5, 'spike', null, { 
                        isStatic: true, 
                        isSensor: true, 
                        label: 'spike', 
                        collisionFilter: { category: CAT_RING } 
                    }); 
                    sprite.setDisplaySize(64, 54); 
                    break;
                    
                case 'boost': 
                    sprite = this.matter.add.sprite(x, y + 11, 'boost', null, { 
                        isStatic: true, 
                        isSensor: true, 
                        label: 'boost', 
                        collisionFilter: { category: CAT_RING } 
                    }); 
                    sprite.setDisplaySize(64, 41); 
                    break;
                    
                case 'ramp': 
                    sprite = this.add.image(x, y, 'tex_ramp').setOrigin(0.5).setDepth(-3); 
                    this.matter.add.rectangle(x, y + 16, 128, 32, { 
                        isStatic: true, 
                        angle: -0.4636, 
                        label: 'ramp', 
                        friction: 0.02, 
                        collisionFilter: { category: CAT_GROUND } 
                    }); 
                    break;
                    
                case 'platform': 
                case 'moto_x': 
                case 'moto_y': 
                    sprite = this.matter.add.sprite(x, y, 'tex_' + obj.t, null, { 
                        isStatic: true, 
                        label: obj.t, 
                        collisionFilter: { category: CAT_GROUND } 
                    }); 
                    sprite.setDisplaySize(128, 16); 
                    sprite.startX = x; 
                    sprite.startY = y; 
                    break;
                    
                case 'start_flag': 
                case 'end_flag': 
                    sprite = this.add.image(x, y - 32, 'tex_' + obj.t.split('_')[0])
                        .setOrigin(0.5).setDepth(-2); 
                    this.matter.add.rectangle(x, y - 32, 48, 120, { 
                        isStatic: true, 
                        isSensor: true, 
                        label: obj.t, 
                        collisionFilter: { category: CAT_RING } 
                    }); 
                    if(obj.t === 'end_flag') {
                        this.endFlagX = x; 
                    }
                    break;
            }
            
            if(sprite) { 
                sprite.objType = obj.t; 
                this.levelObjects.push(sprite); 
            }
        });

        this.cameras.main.setBounds(0, -2000, this.levelLength + 2000, this.gameHeight + 2500);
        this.camTarget = this.add.zone(0, 0, 1, 1);
        this.cameras.main.startFollow(this.camTarget, true, 0.1, 0.1, -this.gameWidth / 3, 0);
        this.cameras.main.setZoom(1);

        this.setupInputs(); 
        this.setupCollisions(); 
        this.updateHUD();
    }

    setPlayerState(state) {
        if(this.playerState === state || this.playerState === 'dead') return;
        
        this.playerState = state;
        
        switch(state) {
            case 'running': 
                this.playerDOM.src = ASSETS.running; 
                break;
            case 'rolling': 
                this.playerDOM.src = ASSETS.rolling; 
                break;
            case 'ground_rolling': 
                this.playerDOM.src = ASSETS.rolling2; 
                break;
            case 'waiting': 
                this.playerDOM.src = ASSETS.waiting; 
                break;
            case 'dead': 
                this.playerDOM.style.display = 'none'; 
                break;
            case 'won': 
                this.playerDOM.src = ASSETS.running; 
                break;
        }
    }

    startGame() { 
        if(this.playerState === 'waiting') { 
            sfx.playBGM(); 
            this.setPlayerState('running'); 
            this.currentSpeed = this.baseSpeed; 
        } 
    }

    setupInputs() {
        this.rollDown = false;
        
        const bindBtn = (id, downFn, upFn) => {
            const el = document.getElementById(id);
            const down = (e) => { 
                e.preventDefault(); 
                e.stopPropagation(); 
                this.startGame(); 
                downFn(); 
            };
            const up = upFn ? (e) => { 
                e.preventDefault(); 
                upFn(); 
            } : null;
            
            el.addEventListener('pointerdown', down);
            if(up) { 
                el.addEventListener('pointerup', up); 
                el.addEventListener('pointerleave', up); 
                el.addEventListener('pointercancel', up); 
            }
        };
        
        bindBtn('zone-left', () => this.rollDown = true, () => this.rollDown = false);
        bindBtn('btn-roll-vis', () => this.rollDown = true, () => this.rollDown = false);
        bindBtn('zone-right', () => this.triggerJump(), null);
        bindBtn('btn-jump-vis', () => this.triggerJump(), null);

        document.getElementById('btn-pause').addEventListener('click', (e) => { 
            e.stopPropagation(); 
            this.startGame(); 
            this.togglePause(); 
        });
        
        document.getElementById('btn-resume').addEventListener('click', () => this.togglePause());

        const returnToIndex = () => window.location.href = 'index.html';
        document.getElementById('btn-quit').addEventListener('click', returnToIndex);
        document.getElementById('btn-quit-death').addEventListener('click', returnToIndex);
        document.getElementById('btn-quit-win').addEventListener('click', returnToIndex);
        
        document.getElementById('btn-retry').addEventListener('click', () => location.reload());
        document.getElementById('btn-play-again').addEventListener('click', () => location.reload());

        this.input.keyboard.on('keydown-SPACE', () => this.triggerJump());
        this.input.keyboard.on('keydown-UP', () => this.triggerJump());
        this.input.keyboard.on('keydown-DOWN', () => { 
            this.startGame(); 
            this.rollDown = true; 
        });
        this.input.keyboard.on('keyup-DOWN', () => this.rollDown = false);
        this.input.keyboard.on('keydown-ESC', () => this.togglePause());
    }

    triggerJump() {
        if(this.isPaused || this.isGameOver || ['dead','won'].includes(this.playerState)) return;
        
        this.startGame();
        
        if(this.isGrounded) {
            const jumpForce = (this.playerState === 'rolling' || this.playerState === 'ground_rolling') ? -18 : -15;
            this.matter.body.setVelocity(this.playerBody, { 
                x: this.playerBody.velocity.x, 
                y: jumpForce 
            });
            this.isGrounded = false; 
            this.setPlayerState('rolling'); 
            sfx.play('jump');
        }
    }

    setupCollisions() {
        this.matter.world.on('collisionstart', (event) => {
            event.pairs.forEach(pair => {
                const { bodyA, bodyB } = pair;
                const playerBody = bodyA.label === 'player' ? bodyA : (bodyB.label === 'player' ? bodyB : null);
                const other = playerBody ? (bodyA === playerBody ? bodyB : bodyA) : null;
                
                if(!other) return;
                
                switch(other.label) {
                    case 'ring': 
                        if(!this.ringsToRemove.includes(other)) { 
                            this.ringsToRemove.push(other); 
                            this.rings++; 
                            this.updateHUD(); 
                            sfx.play('ring'); 
                        } 
                        break;
                    case 'spike': 
                        this.hitSpike(); 
                        break;
                    case 'boost': 
                        this.matter.body.setVelocity(this.playerBody, { 
                            x: this.playerBody.velocity.x + 8, 
                            y: -20 
                        }); 
                        break;
                    case 'end_flag': 
                        this.triggerWin(); 
                        break;
                }
            });
        });
        
        this.matter.world.on('collisionactive', (event) => {
            this.onRamp = false;
            event.pairs.forEach(pair => { 
                if((pair.bodyA.label === 'player' && pair.bodyB.label === 'ramp') || 
                   (pair.bodyB.label === 'player' && pair.bodyA.label === 'ramp')) {
                    this.onRamp = true; 
                }
            });
        });
    }

    hitSpike() {
        if(this.playerState === 'dead' || this.playerState === 'won' || this.time.now < this.invulnTimer) return;
        
        if(this.rings > 0) {
            sfx.play('ring_loss'); 
            const ringsToDrop = this.rings; 
            this.rings = 0; 
            this.updateHUD(); 
            this.showDamage();
            
            const scatterCount = Math.min(ringsToDrop, 20); 
            const angleStep = (Math.PI * 2) / scatterCount;
            
            for(let i = 0; i < scatterCount; i++) {
                const angle = angleStep * i + (Math.random() * 0.3 - 0.15); 
                const distance = 15 + Math.random() * 25;
                
                const rx = this.playerBody.position.x + Math.cos(angle) * distance; 
                const ry = this.playerBody.position.y + Math.sin(angle) * distance - 20;
                
                const rBody = this.matter.add.rectangle(rx, ry, 12, 12, { 
                    restitution: 0.9, 
                    friction: 0.001, 
                    frictionAir: 0.02, 
                    label: 'scattered_ring', 
                    collisionFilter: { category: CAT_SCATTERED, mask: CAT_GROUND } 
                });
                
                const force = 0.02 + Math.random() * 0.015; 
                this.matter.body.applyForce(rBody, rBody.position, { 
                    x: Math.cos(angle) * force, 
                    y: Math.sin(angle) * force - 0.015 
                });
                
                const rDom = createDOMElement(ASSETS.ring, 16, 16); 
                this.scatteredRings.push({ body: rBody, dom: rDom, born: this.time.now });
                
                this.time.delayedCall(600, () => { 
                    if(rBody && !rBody.removed) { 
                        rBody.collisionFilter.category = CAT_RING; 
                        rBody.collisionFilter.mask = CAT_PLAYER | CAT_GROUND; 
                        rBody.label = 'ring'; 
                    } 
                });
                
                this.time.delayedCall(3500, () => { 
                    if(rDom) { 
                        rDom.style.transition = 'opacity 0.5s'; 
                        rDom.style.opacity = '0'; 
                    } 
                });
                
                this.time.delayedCall(4000, () => { 
                    if(rDom) rDom.remove(); 
                    if(rBody && !rBody.removed) { 
                        rBody.removed = true; 
                        this.matter.world.remove(rBody); 
                    } 
                });
            }
            
            this.matter.body.setVelocity(this.playerBody, { x: -4, y: -8 }); 
            this.invulnTimer = this.time.now + 2000; 
            this.startBlinking();
            
        } else {
            this.die();
        }
    }

    showDamage() { 
        this.damageFlash.style.display = 'block'; 
        sfx.play('damage'); 
        
        const originalSrc = this.playerDOM.src; 
        this.playerDOM.src = ASSETS.damage; 
        
        setTimeout(() => { 
            this.damageFlash.style.display = 'none'; 
            if(this.playerState !== 'dead') {
                this.playerDOM.src = originalSrc; 
            }
        }, 300); 
    }

    startBlinking() { 
        let visible = true; 
        const blinkInterval = setInterval(() => { 
            if(this.playerState === 'dead') { 
                clearInterval(blinkInterval); 
                return; 
            } 
            visible = !visible; 
            this.playerDOM.style.opacity = visible ? '1' : '0.3'; 
        }, 100); 
        
        this.time.delayedCall(2000, () => { 
            clearInterval(blinkInterval); 
            this.playerDOM.style.opacity = '1'; 
        }); 
    }

    die() { 
        if(this.playerState === 'dead') return; 
        
        this.setPlayerState('dead'); 
        this.isGameOver = true; 
        sfx.play('ring_loss'); 
        sfx.pauseBGM(); 
        
        this.matter.body.setStatic(this.playerBody, true); 
        this.cameras.main.shake(500, 0.03); 
        
        this.time.delayedCall(1000, () => { 
            document.getElementById('death-modal').style.display = 'flex'; 
        }); 
    }

    triggerWin() { 
        if(this.playerState === 'won' || this.playerState === 'dead') return; 
        
        this.setPlayerState('won'); 
        this.isGameOver = true; 
        sfx.pauseBGM(); 
        
        this.matter.body.setVelocity(this.playerBody, { x: 2, y: 0 }); 
        
        this.time.delayedCall(800, () => { 
            document.getElementById('final-score').innerText = `RINGS: ${this.rings}`; 
            document.getElementById('win-modal').style.display = 'flex'; 
        }); 
    }

    togglePause() { 
        if(this.isGameOver) return; 
        
        this.isPaused = !this.isPaused; 
        
        if(this.isPaused) { 
            this.scene.pause(); 
            sfx.pauseBGM(); 
            document.getElementById('pause-modal').style.display = 'flex'; 
        } else { 
            this.scene.resume(); 
            sfx.playBGM(); 
            document.getElementById('pause-modal').style.display = 'none'; 
        } 
    }

    updateHUD() { 
        document.getElementById('score-hud').innerText = `RINGS: ${this.rings}`; 
    }

    update(time, delta) {
        if(this.isPaused) return; 
        
        const cam = this.cameras.main;
        const px = this.playerBody.position.x - cam.scrollX; 
        const py = this.playerBody.position.y - cam.scrollY;
        
        this.playerDOM.style.transform = `translate(${px - 34}px, ${py - 34}px)`;
        this.camTarget.setPosition(this.playerBody.position.x, this.playerBody.position.y);
        
        this.activeRingDoms.forEach(r => { 
            const rx = r.body.position.x - cam.scrollX; 
            const ry = r.body.position.y - cam.scrollY; 
            r.dom.style.transform = `translate(${rx - 14}px, ${ry - 14}px)`; 
        });
        
        this.scatteredRings.forEach(r => { 
            if(r.body && !r.body.removed) { 
                const rx = r.body.position.x - cam.scrollX; 
                const ry = r.body.position.y - cam.scrollY; 
                r.dom.style.transform = `translate(${rx - 8}px, ${ry - 8}px)`; 
            } 
        });
        
        if(this.ringsToRemove.length > 0) { 
            this.ringsToRemove.forEach(body => { 
                const idx = this.activeRingDoms.findIndex(r => r.body === body); 
                if(idx !== -1) { 
                    this.activeRingDoms[idx].dom.remove(); 
                    this.activeRingDoms.splice(idx, 1); 
                } 
                this.matter.world.remove(body); 
            }); 
            this.ringsToRemove =[]; 
        }
        
        if(this.playerBody.position.y > this.groundY + 300) { 
            this.die(); 
            return; 
        }
        
        if(this.playerBody.position.x >= this.endFlagX && this.playerState !== 'won') { 
            this.triggerWin(); 
            return; 
        }
        
        if(this.playerState === 'waiting' || this.playerState === 'dead' || this.playerState === 'won') {
            return;
        }

        this.levelObjects.forEach(obj => {
            if(!obj.body) return;
            
            if(obj.objType === 'moto_x') { 
                const nx = obj.startX + Math.sin(time * 0.002) * 120; 
                this.matter.body.setPosition(obj.body, { x: nx, y: obj.y }); 
                obj.x = nx; 
            } else if(obj.objType === 'moto_y') { 
                const ny = obj.startY + Math.sin(time * 0.002) * 120; 
                this.matter.body.setPosition(obj.body, { x: obj.x, y: ny }); 
                obj.y = ny; 
            }
        });

        const bodies = this.matter.world.getAllBodies().filter(b => 
            !b.isSensor &&['ground','block','ramp','platform','moto_x','moto_y'].includes(b.label)
        );
        
        const rayStart = { x: this.playerBody.position.x, y: this.playerBody.position.y + 20 };
        const rayEnd = { x: this.playerBody.position.x, y: this.playerBody.position.y + 40 };
        const collisions = Phaser.Physics.Matter.Matter.Query.ray(bodies, rayStart, rayEnd, 8);
        
        this.isGrounded = collisions.length > 0;

        if(this.rollDown && this.isGrounded && this.playerState === 'running') {
            this.setPlayerState('ground_rolling');
        } else if(!this.rollDown && (this.playerState === 'rolling' || this.playerState === 'ground_rolling') && this.isGrounded) {
            this.setPlayerState('running');
        }

        if(this.playerState === 'running') {
            this.currentSpeed = Phaser.Math.Linear(this.currentSpeed, this.baseSpeed, 0.05);
            
            if(time > this.invulnTimer - 1500) {
                this.matter.body.setVelocity(this.playerBody, { 
                    x: this.currentSpeed, 
                    y: this.playerBody.velocity.y 
                });
            }
            
            if(!this.isGrounded) {
                this.setPlayerState('rolling');
            }
            
        } else if(this.playerState === 'rolling' || this.playerState === 'ground_rolling') {
            let targetSpeed = this.isGrounded ? (this.baseSpeed * 1.8) : this.baseSpeed;
            let accel = this.isGrounded ? 0.06 : 0.02;
            
            if(this.onRamp && this.isGrounded) { 
                targetSpeed = this.baseSpeed * 2.5; 
                accel = 0.15; 
            }
            
            this.currentSpeed = Phaser.Math.Linear(this.currentSpeed, targetSpeed, accel);
            
            if(time > this.invulnTimer - 1500) {
                this.matter.body.setVelocity(this.playerBody, { 
                    x: this.currentSpeed, 
                    y: this.playerBody.velocity.y 
                });
            }
            
            if (this.isGrounded && this.rollDown && this.playerState === 'rolling') {
                this.setPlayerState('ground_rolling');
            } else if (!this.isGrounded && this.playerState === 'ground_rolling') {
                this.setPlayerState('rolling');
            }
            
            if(this.isGrounded && !this.rollDown && Math.abs(this.playerBody.velocity.y) < 0.5) {
                this.setPlayerState('running');
            }
        }
        
        if(this.bg) {
            this.bg.tilePositionX = cam.scrollX * 0.3;
        }
    }
}

// Default layout used if no URL params are passed OR if level_1.json is missing
const DEFAULT_LEVEL =[
    { t: 'start_flag', cx: 2, cy: 0 },
    { t: 'ring', cx: 5, cy: 1 }, { t: 'ring', cx: 6, cy: 1 }, { t: 'ring', cx: 7, cy: 1 },
    { t: 'ring', cx: 6, cy: 2 },
    { t: 'block', cx: 10, cy: 1 }, { t: 'ring', cx: 10, cy: 3 },
    { t: 'spike', cx: 14, cy: 0 },
    { t: 'boost', cx: 20, cy: 0 },
    { t: 'ramp', cx: 24, cy: 0 },
    { t: 'end_flag', cx: 30, cy: 0 }
];

window.addEventListener('load', async () => {
    window.sonicLevelData = DEFAULT_LEVEL;

    const params = new URLSearchParams(window.location.search);
    
    try {
        if (params.has('level')) {
            const levelName = params.get('level');
            const customLevels = JSON.parse(localStorage.getItem('sonic_custom_levels') || '[]');
            const found = customLevels.find(l => l.name === levelName);
            if(found && Array.isArray(found.data)) {
                window.sonicLevelData = found.data;
            }
        } 
        else if (params.has('file')) {
            const filePath = params.get('file');
            const response = await fetch(filePath);
            const jsonData = await response.json();
            if(Array.isArray(jsonData)) {
                window.sonicLevelData = jsonData;
            }
        }
    } catch (err) {
        console.error("Failed to load map data, falling back to default built-in level.", err);
    }

    const wrapper = document.getElementById('game-wrapper');
    
    new Phaser.Game({
        type: Phaser.AUTO, 
        parent: 'game-container', 
        width: wrapper.offsetWidth, 
        height: wrapper.offsetHeight,
        scale: { 
            mode: Phaser.Scale.NONE, 
            autoCenter: Phaser.Scale.NO_CENTER 
        },
        backgroundColor: '#4A90E2', 
        physics: { 
            default: 'matter', 
            matter: { 
                gravity: { y: 2.0 }, 
                runner: { isFixed: false, delta: 1000 / 60 }, 
                debug: false 
            } 
        },
        scene: [BootScene, PlayScene], 
        pixelArt: true, 
        antialias: false, 
        roundPixels: true
    });
});
