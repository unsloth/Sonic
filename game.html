<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sonic Dash - Ultimate Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        /* === PURE PIXEL ENGINE CSS === */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        *, ::after, ::before { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Press Start 2P', monospace; }
        
        /* Master Wrapper - Responsive & Rotation Locked */
        #app-wrap {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            transform: translate(-50%, -50%);
            overflow: hidden; background: #000;
        }

        @media screen and (orientation: portrait) { 
            #app-wrap {
                width: 100vh; height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg);
            }
        }

        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI Layer - Handles all touch events to bypass canvas rotation coordinate bugs */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        /* Fullscreen invisible touch zones for fallback controls */
        #touch-left { position: absolute; left: 0; top: 0; width: 50%; height: 100%; z-index: 11; }
        #touch-right { position: absolute; right: 0; top: 0; width: 50%; height: 100%; z-index: 11; }

        /* === HUD & BUTTONS (STRICT PADDING) === */
        .hud-text { position: absolute; color: #FFD700; text-shadow: 2px 2px 0 #002D72, -2px -2px 0 #000; font-size: 14px; z-index: 20; pointer-events: none; }
        
        /* 50px Horiz, 20px Vert */
        #score-hud { top: 20px; left: 50px; }
        
        #pause-ui { position: absolute; bottom: 20px; right: 50px; z-index: 20; }
        
        #mobile-controls { position: absolute; bottom: 20px; left: 50px; display: flex; gap: 20px; z-index: 20; }

        .pixel-btn {
            background: #002D72; border: 3px solid #fff; color: #fff; font-family: inherit;
            box-shadow: inset -3px -3px 0 rgba(0,0,0,0.4), 4px 4px 0 #000; font-size: 10px; padding: 12px 15px; cursor: pointer;
            text-transform: uppercase; transition: transform 0.1s; outline: none; pointer-events: auto;
        }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: none; background: #FFD700; color: #002D72; }
        .btn-red { background: #E3000F; }

        .control-btn { 
            width: 70px; height: 70px; border-radius: 50%; background: rgba(0, 45, 114, 0.6); 
            border: 3px solid rgba(255,255,255,0.6); color: rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center; font-size: 10px; 
            box-shadow: 0 5px 0 rgba(0,0,0,0.3); font-family: inherit; cursor: pointer; pointer-events: auto;
        }
        .control-btn:active { transform: translateY(5px); box-shadow: none; background: rgba(255, 215, 0, 0.8); color: #000; }

        /* === CUSTOM POPUPS === */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center;
            z-index: 100; pointer-events: auto;
        }
        .retro-box {
            background: #002D72; border: 4px solid #fff; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.4), 8px 8px 0 #000;
            padding: 30px; display: flex; flex-direction: column; gap: 20px; align-items: center; text-align: center;
            min-width: 280px; image-rendering: pixelated;
        }
        .modal-title { color:#FFD700; text-shadow:3px 3px 0 #000; font-size:18px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="app-wrap">
        <div id="game-container"></div>
        
        <div id="ui-layer">
            <!-- Touch Zones for logical mapping without canvas coordinate bugs -->
            <div id="touch-left"></div>
            <div id="touch-right"></div>

            <div id="score-hud" class="hud-text">RINGS: 0</div>
            
            <div id="pause-ui">
                <button class="pixel-btn" id="btn-pause">|| PAUSE</button>
            </div>

            <div id="mobile-controls">
                <button class="control-btn" id="btn-roll">ROLL</button>
                <button class="control-btn" id="btn-jump">JUMP</button>
            </div>

            <!-- Custom Modals -->
            <div id="pause-modal" class="modal-overlay">
                <div class="retro-box">
                    <h2 class="modal-title">PAUSED</h2>
                    <button class="pixel-btn" id="btn-resume" style="width:100%;">RESUME</button>
                    <button class="pixel-btn btn-red" onclick="navToMenu()" style="width:100%;">EXIT ZONE</button>
                </div>
            </div>

            <div id="death-modal" class="modal-overlay">
                <div class="retro-box">
                    <h2 class="modal-title" style="color:#ff4c4c;">YOU DIED</h2>
                    <p style="color:#fff; font-size:10px; margin-bottom:10px;">Too slow...</p>
                    <button class="pixel-btn" id="btn-restart-death" style="width:100%;">TRY AGAIN</button>
                    <button class="pixel-btn btn-red" onclick="navToMenu()" style="width:100%;">EXIT</button>
                </div>
            </div>

            <div id="win-modal" class="modal-overlay">
                <div class="retro-box">
                    <h2 class="modal-title" style="color:#00FF00;">ZONE CLEARED</h2>
                    <p id="final-score" style="color:#fff; font-size:12px; margin-bottom:10px;">RINGS: 0</p>
                    <button class="pixel-btn" id="btn-restart-win" style="width:100%;">PLAY AGAIN</button>
                    <button class="pixel-btn btn-red" onclick="navToMenu()" style="width:100%;">MAIN MENU</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. AUDIO SYSTEM
        // ==========================================
        const bgm = new Audio('sound/sonic.mp3');
        bgm.loop = true; bgm.volume = 0.2;
        
        const savedTime = sessionStorage.getItem('sonic_bgm_time');
        if (savedTime) bgm.currentTime = parseFloat(savedTime);
        
        let bgmPlaying = false;
        function playBGM() { if(!bgmPlaying) { bgm.play().catch(e=>e); bgmPlaying = true; } }
        document.addEventListener('pointerdown', playBGM, { once: true });
        setInterval(() => { if (bgmPlaying && !bgm.paused) sessionStorage.setItem('sonic_bgm_time', bgm.currentTime); }, 100);

        function playSFX(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if(ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                
                if (type === 'ring') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(2200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'jump') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'ring_loss') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.5);
                    gain.gain.setValueAtTime(0.4, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start(); osc.stop(ctx.currentTime + 0.5);
                }
            } catch(e) {}
        }

        function navToMenu() {
            playSFX('jump'); sessionStorage.setItem('sonic_bgm_time', bgm.currentTime);
            setTimeout(() => { window.location.href = 'menu.html'; }, 300);
        }

        // ==========================================
        // 2. MEGA TRIAL LEVEL DATA
        // ==========================================
        const MEGA_LEVEL = {
            name: "Mega Trial Zone", speed: 1.0,
            objects:[
                // Safe Zone
                { t: 'start_flag', x: 200, y: -32 },
                { t: 'coin', x: 500, y: -32 }, { t: 'coin', x: 550, y: -32 }, { t: 'coin', x: 600, y: -32 },
                // First Jump & Spike
                { t: 'spike', x: 900, y: -32 },
                { t: 'platform', x: 1100, y: -80 }, { t: 'coin', x: 1100, y: -120 },
                // Ramp Momentum Test
                { t: 'ramp', x: 1500, y: -64 },
                { t: 'coin', x: 1600, y: -180 }, { t: 'coin', x: 1650, y: -200 },
                // Moving Platforms Over "Lava/Pit" (Simulated by gap)
                { t: 'moto_x', x: 2000, y: -100 },
                { t: 'moto_y', x: 2400, y: -150 },
                { t: 'platform', x: 2700, y: -150 },
                // Stop Point & Boost
                { t: 'stop_point', x: 3000, y: -32 },
                { t: 'jump_boost', x: 3200, y: -32 },
                { t: 'coin', x: 3300, y: -300 }, { t: 'coin', x: 3400, y: -350 }, { t: 'coin', x: 3500, y: -300 },
                { t: 'spike', x: 3600, y: -32 }, { t: 'spike', x: 3640, y: -32 },
                // Final Stretch
                { t: 'ramp', x: 4000, y: -64 },
                { t: 'end_flag', x: 4500, y: -32 }
            ]
        };

        // ==========================================
        // 3. GAME ENGINE (PHASER 3)
        // ==========================================
        let gameInstance;
        
        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }
            preload() {
                // User's explicit requested background
                this.load.image('bg', 'images (1).png');
                
                this.load.image('grass', 'img/grass.png');
                this.load.image('dirt', 'img/dirt.png');
                this.load.image('spike', 'img/spike.png');
                this.load.image('boost', 'img/boost.png');
                this.load.image('run', 'img/running.gif');
                this.load.image('roll', 'img/rolling.gif');
                this.load.image('ring', 'img/ring.gif');

                // Instant Canvas Fallbacks
                let g = this.make.graphics({ x:0, y:0, add:false });
                g.fillStyle(0xFFD700); g.fillCircle(16,16,12); g.fillStyle(0x000); g.fillCircle(16,16,8); g.generateTexture('fb_ring', 32, 32);
                g.clear(); g.fillStyle(0x228B22); g.fillRect(0,0,32,32); g.generateTexture('fb_grass', 32, 32);
                g.clear(); g.fillStyle(0x5C4033); g.fillRect(0,0,32,32); g.generateTexture('fb_dirt', 32, 32);
                g.clear(); g.fillStyle(0xAAAAAA); g.fillTriangle(16,0, 32,32, 0,32); g.generateTexture('fb_spike', 32, 32);
                g.clear(); g.fillStyle(0xE3000F); g.fillRect(0,16,32,16); g.fillStyle(0xFFD700); g.fillRect(4,8,24,8); g.generateTexture('fb_boost', 32, 32);
                g.clear(); g.fillStyle(0x0044CC); g.fillCircle(16,16,14); g.fillStyle(0xFFFFFF); g.fillCircle(22,12,4); g.generateTexture('fb_run', 32, 32);
                g.clear(); g.fillStyle(0x0044CC); g.fillCircle(16,16,12); g.lineStyle(4, 0x66CCFF); g.strokeCircle(16,16,10); g.generateTexture('fb_roll', 32, 32);
                g.clear(); g.fillStyle(0xA0522D); g.fillRect(0,0,64,16); g.generateTexture('fb_platform', 64, 16);
                g.clear(); g.fillStyle(0xFF8C00); g.fillRect(0,0,64,16); g.generateTexture('fb_moto_x', 64, 16);
                g.clear(); g.fillStyle(0xFF4500); g.fillRect(0,0,64,16); g.generateTexture('fb_moto_y', 64, 16);
                g.clear(); g.fillStyle(0x000033); g.fillRect(0,0,64,64); g.generateTexture('fb_bg', 64, 64);
            }
            create() {
                const urlParams = new URLSearchParams(window.location.search);
                const levelName = urlParams.get('level');
                let levelData = MEGA_LEVEL;
                if (levelName) {
                    try {
                        const customLevels = JSON.parse(localStorage.getItem('sonic_custom_levels')) ||[];
                        const found = customLevels.find(l => l.name === levelName);
                        if (found) levelData = found;
                    } catch(e) {}
                }
                this.scene.start('PlayScene', { level: levelData });
            }
        }

        class PlayScene extends Phaser.Scene {
            constructor() { super('PlayScene'); }

            init(data) {
                this.levelData = data.level;
                this.groundY = 1000; 
                this.baseSpeed = 9 * (this.levelData.speed || 1);
                this.currentRunSpeed = this.baseSpeed;
                this.rings = 0;
                this.isPaused = false;
            }

            create() {
                this.matter.world.setGravity(0, 2.5); 
                
                // --- STRATIFIED ENVIRONMENT ---
                // 1. Parallax BG (images (1).png)
                this.bg = this.add.tileSprite(0, 0, 8000, 2000, this.textures.exists('bg') ? 'bg' : 'fb_bg');
                this.bg.setOrigin(0,0).setScrollFactor(0.05).setDepth(-10);
                this.bg.tileScaleX = 0.5; this.bg.tileScaleY = 0.5; // Prevent massive zoom

                // 2. Dirt Layer (Infinite depth)
                this.dirt = this.add.tileSprite(0, this.groundY + 32, 100000, 2000, this.textures.exists('dirt') ? 'dirt' : 'fb_dirt');
                this.dirt.setOrigin(0, 0);

                // 3. Grass Layer
                this.grass = this.add.tileSprite(0, this.groundY, 100000, 32, this.textures.exists('grass') ? 'grass' : 'fb_grass');
                this.grass.setOrigin(0, 0);

                // Invisible Solid Ground Body
                this.matter.add.rectangle(50000, this.groundY + 16, 100000, 32, { isStatic: true, friction: 0.1 });

                this.levelObjects = [];
                this.ringsToRemove =[];
                
                this.createPlayer();
                this.loadLevelObjects();
                this.setupHTMLControls();
                this.setupCollisions();

                this.cameras.main.setBounds(0, -2000, 100000, 4000);
                this.cameras.main.startFollow(this.player, true, 0.1, 0.1, -this.scale.width / 4, 100);
                
                this.updateHUD();
            }

            createPlayer() {
                this.playerState = 'running'; // running, rolling, stopped, dead, won, invulnerable
                this.isTouchingRamp = false;
                this.isGrounded = false;
                this.invulnTimer = 0;

                this.player = this.matter.add.sprite(100, this.groundY - 100, this.textures.exists('run') ? 'run' : 'fb_run', null, {
                    shape: { type: 'circle', radius: 14 },
                    friction: 0.001, restitution: 0, label: 'player'
                });
                
                // STRICT DIMENSIONS TO PREVENT GIANT GIFS
                this.player.setDisplaySize(36, 36);
                this.player.setFixedRotation();
            }

            loadLevelObjects() {
                this.levelData.objects.forEach(obj => {
                    const y = this.groundY + obj.y;
                    let tex, sprite;

                    switch(obj.t) {
                        case 'coin':
                            tex = this.textures.exists('ring') ? 'ring' : 'fb_ring';
                            sprite = this.matter.add.sprite(obj.x, y, tex, null, { isStatic: true, isSensor: true, label: 'ring' });
                            sprite.setDisplaySize(20, 20);
                            break;
                        case 'spike':
                            tex = this.textures.exists('spike') ? 'spike' : 'fb_spike';
                            sprite = this.matter.add.sprite(obj.x, y, tex, null, { 
                                shape: { type: 'fromVerts', verts:[{x:16,y:8}, {x:32,y:32}, {x:0,y:32}] }, 
                                isStatic: true, isSensor: true, label: 'spike' 
                            });
                            sprite.setDisplaySize(32, 32);
                            break;
                        case 'jump_boost':
                            tex = this.textures.exists('boost') ? 'boost' : 'fb_boost';
                            sprite = this.matter.add.sprite(obj.x, y, tex, null, { isStatic: true, isSensor: true, label: 'boost' });
                            sprite.setDisplaySize(32, 32);
                            break;
                        case 'ramp':
                            sprite = this.matter.add.sprite(obj.x + 64, y, this.textures.exists('grass') ? 'grass' : 'fb_grass', null, { 
                                shape: { type: 'fromVerts', verts:[{x:0, y:64}, {x:128, y:64}, {x:128, y:0}] }, 
                                isStatic: true, label: 'ramp' 
                            });
                            sprite.setDisplaySize(128, 64); sprite.setTint(0xAAFFAA); 
                            break;
                        case 'platform':
                            sprite = this.matter.add.sprite(obj.x, y, 'fb_platform', null, { isStatic: true, label: 'platform' });
                            sprite.setDisplaySize(64, 16);
                            break;
                        case 'moto_x':
                        case 'moto_y':
                            sprite = this.matter.add.sprite(obj.x, y, obj.t === 'moto_x' ? 'fb_moto_x' : 'fb_moto_y', null, { isStatic: true, label: obj.t });
                            sprite.setDisplaySize(64, 16);
                            sprite.startX = obj.x; sprite.startY = y;
                            break;
                        case 'stop_point':
                            sprite = this.matter.add.sprite(obj.x, y, 'fb_spike', null, { isStatic: true, isSensor: true, label: 'stop_point' });
                            sprite.setDisplaySize(32, 32); sprite.setTint(0xFF0000);
                            break;
                        case 'start_flag':
                            sprite = this.matter.add.sprite(obj.x, y, 'fb_platform', null, { isStatic: true, isSensor: true });
                            sprite.setDisplaySize(10, 64); sprite.setTint(0x00FF00);
                            this.player.setPosition(obj.x, y - 40);
                            break;
                        case 'end_flag':
                            sprite = this.matter.add.sprite(obj.x, y, 'fb_platform', null, { isStatic: true, isSensor: true, label: 'end_flag' });
                            sprite.setDisplaySize(10, 64); sprite.setTint(0xFFFFFF);
                            break;
                    }
                    if(sprite) { sprite.objType = obj.t; this.levelObjects.push(sprite); }
                });
            }

            setupHTMLControls() {
                this.rollBtnDown = false;
                
                // Connect HTML Buttons to Phaser
                const bindTouch = (id, downFn, upFn) => {
                    const el = document.getElementById(id);
                    el.addEventListener('pointerdown', downFn);
                    if(upFn) { el.addEventListener('pointerup', upFn); el.addEventListener('pointerout', upFn); }
                };

                bindTouch('btn-roll', () => this.rollBtnDown = true, () => this.rollBtnDown = false);
                bindTouch('btn-jump', () => this.triggerJump());
                bindTouch('touch-left', () => this.rollBtnDown = true, () => this.rollBtnDown = false);
                bindTouch('touch-right', () => this.triggerJump());

                // Modals
                document.getElementById('btn-pause').onclick = () => this.togglePause();
                document.getElementById('btn-resume').onclick = () => this.togglePause();
                
                const restartHandler = () => {
                    document.querySelectorAll('.modal-overlay').forEach(el => el.style.display = 'none');
                    this.scene.restart();
                };
                document.getElementById('btn-restart-death').onclick = restartHandler;
                document.getElementById('btn-restart-win').onclick = restartHandler;
            }

            triggerJump() {
                if(this.isPaused) return;
                if (this.playerState === 'stopped') {
                    this.playerState = 'running';
                } else if (this.isGrounded && !['dead','won'].includes(this.playerState)) {
                    this.player.setVelocityY(-14);
                    this.isGrounded = false;
                    playSFX('jump');
                    
                    if(this.playerState === 'rolling') {
                        this.playerState = 'running';
                        this.player.setFixedRotation(); this.player.rotation = 0;
                        this.player.setTexture(this.textures.exists('run') ? 'run' : 'fb_run');
                        this.player.setDisplaySize(36, 36);
                    }
                }
            }

            setupCollisions() {
                this.matter.world.on('collisionstart', (event) => {
                    event.pairs.forEach(pair => {
                        const { bodyA, bodyB } = pair;
                        const labels = [bodyA.label, bodyB.label];
                        
                        if (labels.includes('player')) {
                            const other = bodyA.label === 'player' ? bodyB : bodyA;
                            
                            if (other.label === 'ring') {
                                if (!this.ringsToRemove.includes(other.gameObject)) {
                                    this.ringsToRemove.push(other.gameObject);
                                    this.rings++;
                                    this.updateHUD();
                                    playSFX('ring');
                                }
                            } else if (other.label === 'spike') {
                                this.hitSpike();
                            } else if (other.label === 'boost') {
                                this.player.setVelocityY(-22);
                                playSFX('boost');
                            } else if (other.label === 'stop_point') {
                                this.playerState = 'stopped';
                                this.player.setVelocity(0, 0);
                            } else if (other.label === 'end_flag') {
                                this.triggerWin();
                            }
                        }
                    });
                });

                this.matter.world.on('collisionactive', (event) => {
                    this.isTouchingRamp = false;
                    event.pairs.forEach(pair => {
                        if ((pair.bodyA.label === 'player' && pair.bodyB.label === 'ramp') ||
                            (pair.bodyB.label === 'player' && pair.bodyA.label === 'ramp')) {
                            this.isTouchingRamp = true;
                        }
                    });
                });
            }

            updateHUD() {
                document.getElementById('score-hud').innerText = `RINGS: ${this.rings}`;
            }

            hitSpike() {
                if (['dead','won'].includes(this.playerState) || this.time.now < this.invulnTimer) return;

                if (this.rings > 0) {
                    // CLASSIC RING DROP EFFECT
                    playSFX('ring_loss');
                    const dropCount = Math.min(this.rings, 12);
                    this.rings = 0;
                    this.updateHUD();
                    
                    for(let i=0; i<dropCount; i++) {
                        let r = this.matter.add.sprite(this.player.x, this.player.y, this.textures.exists('ring') ? 'ring' : 'fb_ring', null, {
                            isSensor: false, restitution: 0.8, friction: 0.05
                        });
                        r.setDisplaySize(16,16);
                        r.setVelocity(Phaser.Math.Between(-6, 6), Phaser.Math.Between(-12, -5));
                        
                        // Disable collision with player temporarily, destroy after 3s
                        r.setCollisionCategory(2);
                        this.player.setCollidesWith([1]); // Default is 1
                        
                        this.time.delayedCall(3000, () => { if(r && r.active) r.destroy(); });
                    }
                    
                    this.player.setVelocity(-5, -8); // Knockback
                    this.invulnTimer = this.time.now + 2000;
                    
                    // Blink effect
                    this.tweens.add({ targets: this.player, alpha: 0.2, yoyo: true, repeat: 10, duration: 100, onComplete: () => this.player.alpha = 1 });

                } else {
                    // DIE
                    this.playerState = 'dead';
                    playSFX('ring_loss'); 
                    this.player.setStatic(true);
                    this.cameras.main.shake(300, 0.02);
                    setTimeout(() => { document.getElementById('death-modal').style.display = 'flex'; }, 1000);
                }
            }

            triggerWin() {
                if (['dead','won'].includes(this.playerState)) return;
                this.playerState = 'won';
                this.player.setVelocity(0,0);
                setTimeout(() => {
                    document.getElementById('final-score').innerText = `RINGS COLLECTED: ${this.rings}`;
                    document.getElementById('win-modal').style.display = 'flex';
                }, 500);
            }

            togglePause() {
                if(['dead','won'].includes(this.playerState)) return;
                this.isPaused = !this.isPaused;
                if (this.isPaused) {
                    this.scene.pause();
                    document.getElementById('pause-modal').style.display = 'flex';
                } else {
                    this.scene.resume();
                    document.getElementById('pause-modal').style.display = 'none';
                }
            }

            update(time, delta) {
                if (['dead','won'].includes(this.playerState) || this.isPaused) return;

                if (this.ringsToRemove.length > 0) {
                    this.ringsToRemove.forEach(r => { if(r && r.active) r.destroy(); });
                    this.ringsToRemove =[];
                }

                // Moving Platforms
                this.levelObjects.forEach(obj => {
                    if (obj.objType === 'moto_x' && obj.body) this.matter.body.setPosition(obj.body, { x: obj.startX + Math.sin(time*0.002)*100, y: obj.y });
                    if (obj.objType === 'moto_y' && obj.body) this.matter.body.setPosition(obj.body, { x: obj.x, y: obj.startY + Math.sin(time*0.002)*100 });
                });

                // Ground Check
                const bodies = this.matter.world.getAllBodies().filter(b => !b.isSensor && b.label !== 'player' && b.collisionFilter.category !== 2);
                const raycast = Phaser.Physics.Matter.Matter.Query.ray(bodies, { x: this.player.x, y: this.player.y }, { x: this.player.x, y: this.player.y + 22 });
                this.isGrounded = raycast.length > 0;

                if (this.playerState === 'stopped') {
                    this.player.setTexture(this.textures.exists('run') ? 'run' : 'fb_run');
                    this.player.setDisplaySize(36, 36);
                    return;
                }

                // Roll vs Run State Machine
                if (this.rollBtnDown && this.isGrounded && this.playerState === 'running') {
                    this.playerState = 'rolling';
                    this.player.setTexture(this.textures.exists('roll') ? 'roll' : 'fb_roll');
                    this.player.setDisplaySize(36, 36);
                    this.player.setFixedRotation(false); 
                } else if (!this.rollBtnDown && this.playerState === 'rolling') {
                    this.playerState = 'running';
                    this.player.setTexture(this.textures.exists('run') ? 'run' : 'fb_run');
                    this.player.setDisplaySize(36, 36);
                    this.player.setFixedRotation();
                    this.player.rotation = 0;
                }

                // Apply Physics based on state
                if (this.playerState === 'running') {
                    if (this.isTouchingRamp) {
                        this.currentRunSpeed = this.baseSpeed * 0.4;
                    } else {
                        this.currentRunSpeed = Phaser.Math.Linear(this.currentRunSpeed, this.baseSpeed, 0.1);
                    }
                    
                    // Only enforce velocity if not recovering from spike knockback
                    if(this.time.now > this.invulnTimer - 1500) {
                        this.player.setVelocityX(this.currentRunSpeed);
                    }
                    
                    if (!this.isGrounded) {
                        this.player.setTexture(this.textures.exists('roll') ? 'roll' : 'fb_roll');
                        this.player.setDisplaySize(36, 36);
                        this.player.rotation += 0.3;
                    } else {
                        this.player.setTexture(this.textures.exists('run') ? 'run' : 'fb_run');
                        this.player.rotation = 0;
                    }
                } 
                else if (this.playerState === 'rolling') {
                    // Momentum physics on flat vs ramp
                    if (!this.isTouchingRamp && this.player.body.velocity.x < this.baseSpeed) {
                        this.player.applyForce({ x: 0.003, y: 0 }); 
                    }
                    if (this.player.body.velocity.x > 1) this.player.rotation += 0.4;
                }

                // Parallax sync
                if(this.bg) this.bg.tilePositionX = this.cameras.main.scrollX * 0.5;
            }
        }

        // ==========================================
        // 4. BOOTSTRAP RESIZE ENGINE
        // ==========================================
        function initGame() {
            const config = {
                type: Phaser.AUTO,
                parent: 'game-container',
                scale: { 
                    mode: Phaser.Scale.RESIZE,
                    width: '100%', height: '100%'
                },
                backgroundColor: '#4A90E2',
                physics: { default: 'matter', matter: { gravity: { y: 2.5 }, debug: false } },
                scene:[BootScene, PlayScene],
                pixelArt: true
            };
            gameInstance = new Phaser.Game(config);
        }

        window.onload = initGame;
    </script>
</body>
</html>
