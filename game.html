<!--
=============================================================================
SUPER HYPER DETAILED PLAN (NERD MODE)
=============================================================================
1. ARCHITECTURE & LAYOUT REWRITE:
   - Purge all previous hacky CSS (especially the orientation-locked rotations that break canvas coordinates).
   - Canvas container (#game-container) will be strictly 100vw and 100vh with overflow: hidden.
   - Phaser config will use `scale: { mode: Phaser.Scale.RESIZE }` to natively handle dynamic window sizing without coordinate distortion.
   - UI Overlay (#ui-layer) will be completely detached from the canvas.
   - Enforce strict padding: top: 20px, bottom: 20px, left: 50px, right: 50px using CSS absolute positioning.

2. ENVIRONMENT STYLING (GRASS & DIRT):
   - Background image explicitly set to 'images (1).png' as a TileSprite with heavy parallax (scrollFactor: 0.1).
   - Ground Base Y coordinate locked at 1000 to prevent camera offset bugs on resize.
   - Grass Layer: TileSprite at Y=1000, height=32, stretching infinitely right.
   - Dirt Layer: TileSprite right beneath grass (Y=1032), height=3000 (going "all the way down"), stretching infinitely right.

3. CLASSIC SONIC MECHANICS (RING LOSS & INVULNERABILITY):
   - Collision Matrix using Matter.js Collision Filters:
     - Player Category (0x0001)
     - Ground/Wall Category (0x0002)
     - Ring Category (0x0004)
     - Scattered Ring Category (0x0008)
   - When Player hits Spike:
     - If Rings == 0: Trigger Death state.
     - If Rings > 0: Set Rings to 0. Spawn up to 32 physics-enabled ring sprites.
     - Scattered rings will have high restitution (bounciness) and collide with Ground, but NOT the Player initially.
     - Apply knockback velocity to player (-6X, -10Y).
     - Set invulnerability flag for 2000ms. Tween player alpha (flicker effect).
     - After 1000ms, scattered rings become collectible again (switch to Ring Category).
     - After 4000ms, scattered rings despawn to save memory.

4. LONG FEATURE-TESTING MAP:
   - Array-based level generation stretching over 20,000 pixels.
   - Includes: Flat ring-collecting zones, spike jumps, ramp momentum testers, moving platforms over "bottomless" pits (gaps in ground collision), speed boosts, and a final end flag.

5. CUSTOM POPUPS:
   - Unified retro art style (Pixel fonts, thick borders, #002D72 backgrounds, #FFD700 accents).
   - Modals for Pause, Death, and Win. Fully responsive within the padded UI layer.
=============================================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sonic Clone - Ultimate Rewrite</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* RESET & BASE */
        *, ::after, ::before { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }
        html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Press Start 2P', monospace; }

        /* GAME CANVAS CONTAINER - Pure Fullscreen */
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* UI LAYER - STRICT PADDING (50px H, 20px V) */
        #ui-layer {
            position: absolute;
            top: 20px; bottom: 20px;
            left: 50px; right: 50px;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to invisible touch zones */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* INVISIBLE TOUCH ZONES FOR GAMEPLAY */
        #touch-zones { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; display: flex; }
        .touch-half { flex: 1; height: 100%; pointer-events: auto; }

        /* HUD & BUTTONS */
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
        .hud-bottom { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none; }

        #score-hud { color: #FFD700; text-shadow: 2px 2px 0 #002D72, -2px -2px 0 #000; font-size: 16px; line-height: 1.5; }

        .pixel-btn {
            background: #002D72; border: 3px solid #fff; color: #fff; font-family: inherit;
            box-shadow: inset -3px -3px 0 rgba(0,0,0,0.4), 4px 4px 0 #000; font-size: 12px; padding: 12px 20px; cursor: pointer;
            text-transform: uppercase; transition: transform 0.1s; outline: none; pointer-events: auto;
        }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: none; background: #FFD700; color: #002D72; }
        .btn-red { background: #E3000F; }

        .action-btn {
            width: 70px; height: 70px; border-radius: 50%; background: rgba(0, 45, 114, 0.7);
            border: 3px solid rgba(255,255,255,0.8); color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 10px; box-shadow: 0 5px 0 rgba(0,0,0,0.5); font-family: inherit; cursor: pointer; pointer-events: auto;
        }
        .action-btn:active { transform: translateY(5px); box-shadow: none; background: rgba(255, 215, 0, 0.9); color: #000; }

        /* CUSTOM POPUPS / MODALS */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center;
            z-index: 100; pointer-events: auto;
        }
        .retro-box {
            background: #002D72; border: 4px solid #fff; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.4), 8px 8px 0 #000;
            padding: 30px; display: flex; flex-direction: column; gap: 20px; align-items: center; text-align: center;
            min-width: 300px; image-rendering: pixelated;
        }
        .modal-title { color: #FFD700; text-shadow: 3px 3px 0 #000; font-size: 20px; line-height: 1.5; margin-bottom: 10px;}
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="touch-zones">
        <div class="touch-half" id="zone-left"></div>
        <div class="touch-half" id="zone-right"></div>
    </div>

    <div id="ui-layer">
        <div class="hud-top">
            <div id="score-hud">RINGS: 0<br><span id="speed-hud" style="font-size:10px; color:#FFF;">SPEED: 0</span></div>
            <button class="pixel-btn" id="btn-pause">|| PAUSE</button>
        </div>
        <div class="hud-bottom">
            <button class="action-btn" id="btn-roll-vis">ROLL</button>
            <button class="action-btn" id="btn-jump-vis">JUMP</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="pause-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title">PAUSED</h2>
            <button class="pixel-btn" id="btn-resume" style="width:100%;">RESUME</button>
        </div>
    </div>

    <div id="death-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title" style="color:#ff4c4c;">YOU DIED</h2>
            <p style="color:#fff; font-size:10px;">Lost all rings!</p>
            <button class="pixel-btn" id="btn-restart-death" style="width:100%;">TRY AGAIN</button>
        </div>
    </div>

    <div id="win-modal" class="modal-overlay">
        <div class="retro-box">
            <h2 class="modal-title" style="color:#00FF00;">ZONE CLEARED</h2>
            <p id="final-score" style="color:#fff; font-size:12px;">RINGS: 0</p>
            <button class="pixel-btn" id="btn-restart-win" style="width:100%;">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // ==========================================
        // AUDIO SYNTHESIS FALLBACK
        // ==========================================
        class AudioEngine {
            constructor() {
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) { console.warn("Audio disabled"); }
            }
            play(type) {
                if(!this.ctx) return;
                if(this.ctx.state === 'suspended') this.ctx.resume();
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);

                if (type === 'ring') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(1200, t); osc.frequency.exponentialRampToValueAtTime(2200, t + 0.1);
                    gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                    osc.start(t); osc.stop(t + 0.3);
                } else if (type === 'jump') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(300, t + 0.2);
                    gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                    osc.start(t); osc.stop(t + 0.2);
                } else if (type === 'ring_loss') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.5);
                    gain.gain.setValueAtTime(0.4, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                    osc.start(t); osc.stop(t + 0.5);
                } else if (type === 'boost') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(800, t + 0.4);
                    gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                    osc.start(t); osc.stop(t + 0.4);
                }
            }
        }
        const sfx = new AudioEngine();

        // ==========================================
        // LONG LEVEL DESIGN (Feature Testing Map)
        // ==========================================
        const LEVEL_DATA =[
            { t: 'start_flag', x: 200, y: -32 },
            // Basic Rings
            { t: 'ring', x: 500, y: -32 }, { t: 'ring', x: 550, y: -32 }, { t: 'ring', x: 600, y: -32 },
            // First Obstacle
            { t: 'spike', x: 1000, y: -32 },
            { t: 'ring', x: 1000, y: -120 }, { t: 'ring', x: 1050, y: -120 },
            // Platforms & Gap Jump
            { t: 'platform', x: 1400, y: -80 }, { t: 'platform', x: 1600, y: -120 }, { t: 'platform', x: 1800, y: -80 },
            { t: 'ring', x: 1600, y: -160 },
            // Gap in floor (we handle this via physics collision logic in scene)
            { t: 'gap_start', x: 2000, y: 0 }, { t: 'gap_end', x: 2500, y: 0 },
            // Moving Platforms over Gap
            { t: 'moto_x', x: 2100, y: -100 }, { t: 'moto_y', x: 2350, y: -150 },
            // High Speed Ramp
            { t: 'ramp', x: 2800, y: -64 },
            { t: 'ring', x: 2950, y: -200 }, { t: 'ring', x: 3000, y: -250 }, { t: 'ring', x: 3050, y: -200 },
            // Stop point & Boost
            { t: 'stop_point', x: 3500, y: -32 },
            { t: 'boost', x: 3700, y: -32 },
            // Spike Pit (Long jump required)
            { t: 'spike', x: 3850, y: -32 }, { t: 'spike', x: 3882, y: -32 }, { t: 'spike', x: 3914, y: -32 },
            { t: 'ring', x: 3882, y: -150 },
            // Long stretch
            { t: 'ring', x: 4500, y: -32 }, { t: 'ring', x: 4600, y: -32 }, { t: 'ring', x: 4700, y: -32 },
            { t: 'spike', x: 5000, y: -32 },
            // Ramp 2
            { t: 'ramp', x: 5500, y: -64 },
            // End
            { t: 'end_flag', x: 6500, y: -32 }
        ];

        // ==========================================
        // PHASER ENGINE SETUP
        // ==========================================
        
        // Collision Categories
        const CAT_PLAYER = 0x0001;
        const CAT_GROUND = 0x0002;
        const CAT_RING = 0x0004;
        const CAT_SCATTERED_RING = 0x0008;

        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }
            preload() {
                // Background
                this.load.image('bg', 'images (1).png');
                
                // Fallback Asset Generator
                let g = this.make.graphics({x:0, y:0, add:false});
                
                // Grass Tile
                g.fillStyle(0x228B22); g.fillRect(0,0,64,32);
                g.fillStyle(0x196619); g.fillRect(0,0,64,8); g.generateTexture('tex_grass', 64, 32);
                
                // Dirt Tile
                g.clear(); g.fillStyle(0x5C4033); g.fillRect(0,0,64,64);
                g.fillStyle(0x4A332A); g.fillRect(16,16,8,8); g.fillRect(40,40,8,8); g.generateTexture('tex_dirt', 64, 64);
                
                // Ring
                g.clear(); g.fillStyle(0xFFD700); g.fillCircle(16,16,12); 
                g.fillStyle(0x000); g.fillCircle(16,16,8); g.generateTexture('tex_ring', 32, 32);
                
                // Spike
                g.clear(); g.fillStyle(0xAAAAAA); g.fillTriangle(16,0, 32,32, 0,32); g.generateTexture('tex_spike', 32, 32);
                
                // Boost
                g.clear(); g.fillStyle(0xE3000F); g.fillRect(0,16,32,16); 
                g.fillStyle(0xFFD700); g.fillRect(4,8,24,8); g.generateTexture('tex_boost', 32, 32);
                
                // Player Run
                g.clear(); g.fillStyle(0x0044CC); g.fillCircle(16,16,14); 
                g.fillStyle(0xFFFFFF); g.fillCircle(22,12,4); g.generateTexture('tex_run', 32, 32);
                
                // Player Roll
                g.clear(); g.fillStyle(0x0044CC); g.fillCircle(16,16,12); 
                g.lineStyle(4, 0x66CCFF); g.strokeCircle(16,16,10); g.generateTexture('tex_roll', 32, 32);
                
                // Platform & Motos
                g.clear(); g.fillStyle(0xA0522D); g.fillRect(0,0,64,16); g.generateTexture('tex_platform', 64, 16);
                g.clear(); g.fillStyle(0xFF8C00); g.fillRect(0,0,64,16); g.generateTexture('tex_moto_x', 64, 16);
                g.clear(); g.fillStyle(0xFF4500); g.fillRect(0,0,64,16); g.generateTexture('tex_moto_y', 64, 16);
                
                // Flags & Stop
                g.clear(); g.fillStyle(0x00FF00); g.fillRect(0,0,10,64); g.generateTexture('tex_start', 10, 64);
                g.clear(); g.fillStyle(0xFFFFFF); g.fillRect(0,0,10,64); g.generateTexture('tex_end', 10, 64);
                g.clear(); g.fillStyle(0xFF0000); g.fillRect(0,0,32,32); g.generateTexture('tex_stop', 32, 32);
            }
            create() {
                this.scene.start('PlayScene');
            }
        }

        class PlayScene extends Phaser.Scene {
            constructor() { super('PlayScene'); }

            init() {
                this.groundY = 1000;
                this.baseSpeed = 10;
                this.currentRunSpeed = this.baseSpeed;
                this.rings = 0;
                this.isPaused = false;
                this.playerState = 'running'; // running, rolling, stopped, dead, won
                this.invulnTimer = 0;
                this.levelLength = 8000;
            }

            create() {
                this.matter.world.setGravity(0, 2.5);

                // --- 1. PARALLAX BACKGROUND ---
                this.bg = this.add.tileSprite(0, 0, this.levelLength, 2000, 'bg');
                this.bg.setOrigin(0,0).setScrollFactor(0.05).setDepth(-10);
                this.bg.tileScaleX = 1; this.bg.tileScaleY = 1; 

                // --- 2. DIRT LAYER (Goes all the way down) ---
                this.dirt = this.add.tileSprite(0, this.groundY + 32, this.levelLength, 3000, 'tex_dirt');
                this.dirt.setOrigin(0, 0).setDepth(-5);

                // --- 3. GRASS LAYER ---
                this.grass = this.add.tileSprite(0, this.groundY, this.levelLength, 32, 'tex_grass');
                this.grass.setOrigin(0, 0).setDepth(-4);

                // --- 4. PHYSICS GROUND ---
                // We create ground chunks based on gaps in LEVEL_DATA
                let gaps = LEVEL_DATA.filter(o => o.t === 'gap_start' || o.t === 'gap_end').sort((a,b)=>a.x - b.x);
                let startX = -1000;
                
                for(let i=0; i<gaps.length; i+=2) {
                    let gapS = gaps[i];
                    let gapE = gaps[i+1];
                    let width = gapS.x - startX;
                    this.matter.add.rectangle(startX + width/2, this.groundY + 32, width, 64, { isStatic: true, friction: 0.05, collisionFilter: { category: CAT_GROUND } });
                    startX = gapE.x;
                }
                // Final chunk
                this.matter.add.rectangle(startX + (this.levelLength-startX)/2, this.groundY + 32, this.levelLength - startX, 64, { isStatic: true, friction: 0.05, collisionFilter: { category: CAT_GROUND } });

                // --- 5. PLAYER ---
                this.player = this.matter.add.sprite(100, this.groundY - 100, 'tex_run', null, {
                    shape: { type: 'circle', radius: 14 },
                    friction: 0.001, restitution: 0, label: 'player',
                    collisionFilter: { category: CAT_PLAYER, mask: CAT_GROUND | CAT_RING }
                });
                this.player.setDisplaySize(36, 36);
                this.player.setFixedRotation();

                // --- 6. LEVEL OBJECTS ---
                this.levelObjects = [];
                this.ringsToRemove = [];
                this.scatteredRings =[];
                
                LEVEL_DATA.forEach(obj => {
                    const y = this.groundY + obj.y;
                    let sprite;
                    let isSensor = true;
                    let cat = CAT_RING;

                    if(obj.t === 'gap_start' || obj.t === 'gap_end') return;

                    if (obj.t === 'ring') {
                        sprite = this.matter.add.sprite(obj.x, y, 'tex_ring', null, { isStatic: true, isSensor: true, label: 'ring', collisionFilter:{category: CAT_RING} });
                        sprite.setDisplaySize(20, 20);
                    } else if (obj.t === 'spike') {
                        sprite = this.matter.add.sprite(obj.x, y, 'tex_spike', null, { 
                            shape: { type: 'fromVerts', verts:[{x:16,y:8}, {x:32,y:32}, {x:0,y:32}] }, 
                            isStatic: true, isSensor: true, label: 'spike', collisionFilter:{category: CAT_RING} 
                        });
                        sprite.setDisplaySize(32, 32);
                    } else if (obj.t === 'boost') {
                        sprite = this.matter.add.sprite(obj.x, y, 'tex_boost', null, { isStatic: true, isSensor: true, label: 'boost', collisionFilter:{category: CAT_RING} });
                        sprite.setDisplaySize(32, 32);
                    } else if (obj.t === 'ramp') {
                        sprite = this.matter.add.sprite(obj.x + 64, y, 'tex_grass', null, { 
                            shape: { type: 'fromVerts', verts:[{x:0, y:64}, {x:128, y:64}, {x:128, y:0}] }, 
                            isStatic: true, label: 'ramp', collisionFilter:{category: CAT_GROUND}
                        });
                        sprite.setDisplaySize(128, 64); sprite.setTint(0xAAFFAA);
                    } else if (obj.t === 'platform' || obj.t === 'moto_x' || obj.t === 'moto_y') {
                        sprite = this.matter.add.sprite(obj.x, y, `tex_${obj.t}`, null, { isStatic: true, label: obj.t, collisionFilter:{category: CAT_GROUND} });
                        sprite.setDisplaySize(64, 16);
                        sprite.startX = obj.x; sprite.startY = y;
                    } else if (obj.t === 'stop_point') {
                        sprite = this.matter.add.sprite(obj.x, y, 'tex_stop', null, { isStatic: true, isSensor: true, label: 'stop_point', collisionFilter:{category: CAT_RING} });
                        sprite.setDisplaySize(32, 32);
                    } else if (obj.t === 'start_flag' || obj.t === 'end_flag') {
                        sprite = this.matter.add.sprite(obj.x, y, obj.t==='start_flag'?'tex_start':'tex_end', null, { isStatic: true, isSensor: true, label: obj.t, collisionFilter:{category: CAT_RING} });
                        sprite.setDisplaySize(10, 64);
                        if(obj.t==='start_flag') this.player.setPosition(obj.x, y - 40);
                    }

                    if(sprite) { sprite.objType = obj.t; this.levelObjects.push(sprite); }
                });

                // --- 7. CAMERA ---
                this.cameras.main.setBounds(0, -2000, this.levelLength, 4000);
                this.cameras.main.startFollow(this.player, true, 0.1, 0.1, -this.scale.width / 4, 100);

                // --- 8. INPUTS ---
                this.setupInputs();
                this.setupCollisions();
                this.updateHUD();
            }

            setupInputs() {
                this.rollDown = false;
                
                const bind = (id, downFn, upFn) => {
                    const el = document.getElementById(id);
                    el.onpointerdown = downFn;
                    if(upFn) { el.onpointerup = upFn; el.onpointerout = upFn; }
                };

                // Left side / Roll button
                const doRoll = () => { this.rollDown = true; };
                const endRoll = () => { this.rollDown = false; };
                bind('zone-left', doRoll, endRoll);
                bind('btn-roll-vis', doRoll, endRoll);

                // Right side / Jump button
                const doJump = () => { this.triggerJump(); };
                bind('zone-right', doJump);
                bind('btn-jump-vis', doJump);

                // UI buttons
                document.getElementById('btn-pause').onclick = () => this.togglePause();
                document.getElementById('btn-resume').onclick = () => this.togglePause();
                
                const restart = () => {
                    document.querySelectorAll('.modal-overlay').forEach(el => el.style.display = 'none');
                    this.scene.restart();
                };
                document.getElementById('btn-restart-death').onclick = restart;
                document.getElementById('btn-restart-win').onclick = restart;
            }

            triggerJump() {
                if(this.isPaused || ['dead','won'].includes(this.playerState)) return;
                
                if (this.playerState === 'stopped') {
                    this.playerState = 'running'; // Release from stop point
                } else if (this.isGrounded) {
                    this.player.setVelocityY(-14);
                    this.isGrounded = false;
                    sfx.play('jump');
                    
                    if(this.playerState === 'rolling') {
                        this.playerState = 'running';
                        this.player.setFixedRotation(); this.player.rotation = 0;
                        this.player.setTexture('tex_run');
                        this.player.setDisplaySize(36, 36);
                    }
                }
            }

            setupCollisions() {
                this.matter.world.on('collisionstart', (event) => {
                    event.pairs.forEach(pair => {
                        const { bodyA, bodyB } = pair;
                        const labels =[bodyA.label, bodyB.label];
                        
                        // Player Collisions
                        if (labels.includes('player')) {
                            const other = bodyA.label === 'player' ? bodyB : bodyA;
                            
                            if (other.label === 'ring') {
                                if (!this.ringsToRemove.includes(other.gameObject)) {
                                    this.ringsToRemove.push(other.gameObject);
                                    this.rings++;
                                    this.updateHUD();
                                    sfx.play('ring');
                                }
                            } else if (other.label === 'spike') {
                                this.hitSpike();
                            } else if (other.label === 'boost') {
                                this.player.setVelocityY(-22);
                                sfx.play('boost');
                            } else if (other.label === 'stop_point') {
                                this.playerState = 'stopped';
                                this.player.setVelocity(0, 0);
                            } else if (other.label === 'end_flag') {
                                this.triggerWin();
                            }
                        }
                    });
                });

                this.matter.world.on('collisionactive', (event) => {
                    this.isTouchingRamp = false;
                    event.pairs.forEach(pair => {
                        if ((pair.bodyA.label === 'player' && pair.bodyB.label === 'ramp') ||
                            (pair.bodyB.label === 'player' && pair.bodyA.label === 'ramp')) {
                            this.isTouchingRamp = true;
                        }
                    });
                });
            }

            hitSpike() {
                if (['dead','won'].includes(this.playerState) || this.time.now < this.invulnTimer) return;

                if (this.rings > 0) {
                    // CLASSIC RING DROP EFFECT
                    sfx.play('ring_loss');
                    const dropCount = Math.min(this.rings, 32);
                    this.rings = 0;
                    this.updateHUD();
                    
                    for(let i=0; i<dropCount; i++) {
                        let r = this.matter.add.sprite(this.player.x, this.player.y, 'tex_ring', null, {
                            shape: { type: 'circle', radius: 8 },
                            restitution: 0.8, friction: 0.05, label: 'scattered_ring',
                            // Only collide with ground initially
                            collisionFilter: { category: CAT_SCATTERED_RING, mask: CAT_GROUND }
                        });
                        r.setDisplaySize(16,16);
                        r.setVelocity(Phaser.Math.Between(-8, 8), Phaser.Math.Between(-15, -5));
                        this.scatteredRings.push(r);
                        
                        // Re-enable collection after 1 second
                        this.time.delayedCall(1000, () => {
                            if(r && r.active) {
                                r.setCollisionCategory(CAT_RING);
                                r.setCollidesWith(CAT_PLAYER | CAT_GROUND);
                                r.label = 'ring'; // Treat as normal ring now
                            }
                        });
                        
                        // Despawn after 4 seconds
                        this.time.delayedCall(4000, () => {
                            if(r && r.active) {
                                this.tweens.add({ targets: r, alpha: 0, duration: 200, onComplete: ()=>r.destroy() });
                            }
                        });
                    }
                    
                    this.player.setVelocity(-6, -10); // Knockback
                    this.invulnTimer = this.time.now + 2000;
                    
                    // Blink effect
                    this.tweens.add({ targets: this.player, alpha: 0.2, yoyo: true, repeat: 10, duration: 100, onComplete: () => this.player.alpha = 1 });

                } else {
                    // DIE
                    this.playerState = 'dead';
                    sfx.play('ring_loss'); 
                    this.player.setStatic(true);
                    this.cameras.main.shake(300, 0.02);
                    setTimeout(() => { document.getElementById('death-modal').style.display = 'flex'; }, 1000);
                }
            }

            triggerWin() {
                if (['dead','won'].includes(this.playerState)) return;
                this.playerState = 'won';
                this.player.setVelocity(0,0);
                setTimeout(() => {
                    document.getElementById('final-score').innerText = `RINGS: ${this.rings}`;
                    document.getElementById('win-modal').style.display = 'flex';
                }, 500);
            }

            togglePause() {
                if(['dead','won'].includes(this.playerState)) return;
                this.isPaused = !this.isPaused;
                if (this.isPaused) {
                    this.scene.pause();
                    document.getElementById('pause-modal').style.display = 'flex';
                } else {
                    this.scene.resume();
                    document.getElementById('pause-modal').style.display = 'none';
                }
            }

            updateHUD() {
                document.getElementById('score-hud').innerHTML = `RINGS: ${this.rings}<br><span id="speed-hud" style="font-size:10px; color:#FFF;">SPEED: ${Math.floor(this.currentRunSpeed)}</span>`;
            }

            update(time, delta) {
                if (['dead','won'].includes(this.playerState) || this.isPaused) return;

                // Cleanup collected rings
                if (this.ringsToRemove.length > 0) {
                    this.ringsToRemove.forEach(r => { if(r && r.active) r.destroy(); });
                    this.ringsToRemove =[];
                }

                // Moving Platforms
                this.levelObjects.forEach(obj => {
                    if (obj.objType === 'moto_x' && obj.body) this.matter.body.setPosition(obj.body, { x: obj.startX + Math.sin(time*0.002)*150, y: obj.y });
                    if (obj.objType === 'moto_y' && obj.body) this.matter.body.setPosition(obj.body, { x: obj.x, y: obj.startY + Math.sin(time*0.002)*150 });
                });

                // Ground Check Raycast
                const bodies = this.matter.world.getAllBodies().filter(b => !b.isSensor && b.label !== 'player' && b.collisionFilter.category === CAT_GROUND);
                const raycast = Phaser.Physics.Matter.Matter.Query.ray(bodies, { x: this.player.x, y: this.player.y }, { x: this.player.x, y: this.player.y + 22 });
                this.isGrounded = raycast.length > 0;

                // Pit Death Check
                if (this.player.y > this.groundY + 1000) {
                    this.rings = 0; // Force 0 rings so hitSpike triggers death
                    this.hitSpike();
                }

                if (this.playerState === 'stopped') {
                    this.player.setTexture('tex_run');
                    this.player.setDisplaySize(36, 36);
                    return;
                }

                // State Machine (Run vs Roll)
                if (this.rollDown && this.isGrounded && this.playerState === 'running') {
                    this.playerState = 'rolling';
                    this.player.setTexture('tex_roll');
                    this.player.setDisplaySize(36, 36);
                    this.player.setFixedRotation(false); 
                } else if (!this.rollDown && this.playerState === 'rolling') {
                    this.playerState = 'running';
                    this.player.setTexture('tex_run');
                    this.player.setDisplaySize(36, 36);
                    this.player.setFixedRotation();
                    this.player.rotation = 0;
                }

                // Physics Application
                if (this.playerState === 'running') {
                    if (this.isTouchingRamp) {
                        this.currentRunSpeed = this.baseSpeed * 0.4;
                    } else {
                        this.currentRunSpeed = Phaser.Math.Linear(this.currentRunSpeed, this.baseSpeed, 0.1);
                    }
                    
                    // Only enforce velocity if not recovering from spike knockback
                    if(this.time.now > this.invulnTimer - 1500) {
                        this.player.setVelocityX(this.currentRunSpeed);
                    }
                    
                    if (!this.isGrounded) {
                        this.player.setTexture('tex_roll');
                        this.player.setDisplaySize(36, 36);
                        this.player.rotation += 0.3;
                    } else {
                        this.player.setTexture('tex_run');
                        this.player.rotation = 0;
                    }
                } 
                else if (this.playerState === 'rolling') {
                    // Momentum physics on flat vs ramp
                    if (!this.isTouchingRamp && this.player.body.velocity.x < this.baseSpeed) {
                        this.player.applyForce({ x: 0.003, y: 0 }); 
                    }
                    if (this.player.body.velocity.x > 1) this.player.rotation += 0.4;
                }

                // Parallax sync
                if(this.bg) this.bg.tilePositionX = this.cameras.main.scrollX * 0.5;
                
                // Update HUD element once in a while
                if(time % 10 < 1) this.updateHUD();
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        window.onload = () => {
            const config = {
                type: Phaser.AUTO,
                parent: 'game-container',
                scale: { 
                    mode: Phaser.Scale.RESIZE,
                    width: '100%', height: '100%'
                },
                backgroundColor: '#4A90E2',
                physics: { default: 'matter', matter: { gravity: { y: 2.5 }, debug: false } },
                scene: [BootScene, PlayScene],
                pixelArt: true
            };
            new Phaser.Game(config);
        };
    </script>
</body>
</html>
